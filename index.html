<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament Bracket</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        :root {
            --bg: #0f0f23;
            --accent: #00ff9d;
            --text: #e0e0ff;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Press Start 2P', system-ui;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        header {
            background: #1a1a2e;
            padding: 20px;
            text-align: center;
            border-bottom: 4px solid var(--accent);
        }
        
        h1 {
            font-size: 2.2rem;
            text-shadow: 0 0 10px var(--accent);
        }
        
        .container { display: flex; flex: 1; overflow: hidden; }
        
        .sidebar {
            width: 320px;
            background: #1a1a2e;
            padding: 20px;
            border-right: 4px solid var(--accent);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .input-area { display: flex; gap: 8px; }
        
        input {
            flex: 1;
            padding: 12px;
            background: #16213e;
            border: 2px solid var(--accent);
            color: white;
            font-family: inherit;
        }
        
        button {
            font-family: inherit;
            padding: 12px 16px;
            background: var(--accent);
            color: #0f0f23;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        
        button:hover { background: #00cc7a; transform: scale(1.05); }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        
        .secondary-btn { background: #333366; color: white; }
        
        .participants-list {
            flex: 1;
            background: #16213e;
            border: 2px solid var(--accent);
            padding: 10px;
            overflow-y: auto;
        }
        
        .participant {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: #1e2a4d;
            margin-bottom: 8px;
        }
        
        .remove-btn {
            background: #ff3366;
            color: white;
            padding: 4px 10px;
            font-size: 0.8rem;
        }
        
        .main-area {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }
        
        .controls {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        
        .bracket {
            display: flex;
            gap: 40px;
            justify-content: center;
            min-height: 600px;
        }
        
        .round {
            display: flex;
            flex-direction: column;
            gap: 50px;
            min-width: 240px;
        }
        
        .round-header {
            text-align: center;
            color: var(--accent);
            margin-bottom: 20px;
            font-size: 1.1rem;
        }
        
        .match {
            background: #16213e;
            border: 3px solid #00ff9d;
            padding: 12px;
            min-height: 115px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 0 15px rgba(0, 255, 157, 0.3);
        }
        
        .match-player {
            padding: 10px 12px;
            margin: 4px 0;
            background: #1e2a4d;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }
        
        .match-player:hover { background: #2a3a66; }
        .match-player.winner { 
            background: #00ff9d; 
            color: #0f0f23; 
            font-weight: bold;
        }
        .match-player.bye { color: #8888cc; font-style: italic; }
        
        .vs {
            text-align: center;
            font-size: 0.8rem;
            color: #666;
            margin: 4px 0;
        }
        
        .champion {
            text-align: center;
            margin-top: 40px;
            font-size: 2.5rem;
            color: var(--accent);
            text-shadow: 0 0 20px var(--accent);
        }
        
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #666;
        }
    </style>
</head>
<body>
    <header><h1>BRACKET BATTLE</h1></header>
    
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <h2 style="color: var(--accent);">PARTICIPANTS</h2>
            
            <div class="input-area">
                <input type="text" id="name-input" placeholder="Enter name..." maxlength="20">
                <button onclick="addParticipant()">ADD</button>
            </div>
            
            <div style="display: flex; gap: 8px;">
                <button onclick="shuffleParticipants()" class="secondary-btn" style="flex:1">SHUFFLE</button>
                <button onclick="clearAll()" class="secondary-btn" style="flex:1">CLEAR</button>
            </div>
            
            <div class="participants-list" id="participants-list"></div>
            
            <button onclick="generateBracket()" id="generate-btn" style="padding: 18px; font-size: 1.1rem;">
                GENERATE BRACKET
            </button>
        </div>
        
        <!-- Main -->
        <div class="main-area">
            <div class="controls">
                <button onclick="resetTournament()" id="reset-btn" style="display:none">NEW TOURNAMENT</button>
                <button onclick="undoLast()" id="undo-btn" style="display:none">UNDO LAST</button>
            </div>
            
            <div id="bracket-container">
                <div class="empty-state">
                    <h2>Add fighters → Generate Bracket</h2>
                </div>
            </div>
            
            <div id="champion-display" style="display:none"></div>
        </div>
    </div>

    <script>
        let participants = [];
        let tournament = null;

        function addParticipant() {
            const input = document.getElementById('name-input');
            const name = input.value.trim();
            if (!name) return;
            if (participants.length >= 32) return alert("Maximum 32 players");
            
            participants.push({ id: Date.now(), name });
            input.value = '';
            renderParticipants();
        }

        function renderParticipants() {
            const list = document.getElementById('participants-list');
            list.innerHTML = '';
            
            if (participants.length === 0) {
                list.innerHTML = '<div style="padding:30px;text-align:center;color:#666">No participants yet...</div>';
                return;
            }
            
            participants.forEach((p, i) => {
                const div = document.createElement('div');
                div.className = 'participant';
                div.innerHTML = `
                    <span>${p.name}</span>
                    <button class="remove-btn" onclick="removeParticipant(${i})">X</button>
                `;
                list.appendChild(div);
            });
        }

        function removeParticipant(i) {
            participants.splice(i, 1);
            renderParticipants();
        }

        function shuffleParticipants() {
            for (let i = participants.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [participants[i], participants[j]] = [participants[j], participants[i]];
            }
            renderParticipants();
        }

        function clearAll() {
            if (confirm("Clear all participants?")) {
                participants = [];
                renderParticipants();
                resetDisplay();
            }
        }

        function generateBracket() {
            if (participants.length < 2) return alert("Need at least 2 participants!");
            
            const players = [...participants].sort(() => Math.random() - 0.5);
            tournament = { rounds: [] };
            
            let currentPlayers = [...players];
            
            while (currentPlayers.length > 1) {
                const matches = [];
                const nextPlayers = [];
                
                for (let i = 0; i < currentPlayers.length; i += 2) {
                    if (i + 1 < currentPlayers.length) {
                        matches.push({
                            player1: currentPlayers[i],
                            player2: currentPlayers[i + 1],
                            winner: null
                        });
                    } else {
                        // Bye
                        matches.push({
                            player1: currentPlayers[i],
                            player2: { name: "BYE", bye: true },
                            winner: currentPlayers[i]
                        });
                        nextPlayers.push(currentPlayers[i]);
                    }
                }
                
                tournament.rounds.push({
                    name: getRoundName(tournament.rounds.length, players.length),
                    matches: matches
                });
                
                currentPlayers = nextPlayers.length ? nextPlayers : new Array(Math.ceil(currentPlayers.length / 2)).fill(null);
            }
            
            renderBracket();
            document.getElementById('reset-btn').style.display = 'inline-block';
            document.getElementById('undo-btn').style.display = 'inline-block';
        }

        function getRoundName(roundIdx, total) {
            const totalRounds = Math.ceil(Math.log2(total));
            const roundsLeft = totalRounds - roundIdx;
            if (roundsLeft === 1) return "FINAL";
            if (roundsLeft === 2) return "SEMI FINALS";
            if (roundsLeft === 3) return "QUARTER FINALS";
            return `ROUND ${roundIdx + 1}`;
        }

        function renderBracket() {
            const container = document.getElementById('bracket-container');
            container.innerHTML = '';
            
            const bracket = document.createElement('div');
            bracket.className = 'bracket';
            
            tournament.rounds.forEach((round, rIdx) => {
                const roundDiv = document.createElement('div');
                roundDiv.className = 'round';
                
                const header = document.createElement('div');
                header.className = 'round-header';
                header.textContent = round.name;
                roundDiv.appendChild(header);
                
                round.matches.forEach((match, mIdx) => {
                    const matchDiv = document.createElement('div');
                    matchDiv.className = 'match';
                    
                    // Player 1
                    const p1 = createPlayerElement(match.player1, match.winner === match.player1, () => selectWinner(rIdx, mIdx, 0));
                    matchDiv.appendChild(p1);
                    
                    // VS
                    const vs = document.createElement('div');
                    vs.className = 'vs';
                    vs.textContent = 'VS';
                    matchDiv.appendChild(vs);
                    
                    // Player 2
                    const p2 = createPlayerElement(match.player2, match.winner === match.player2, () => selectWinner(rIdx, mIdx, 1));
                    matchDiv.appendChild(p2);
                    
                    roundDiv.appendChild(matchDiv);
                });
                
                bracket.appendChild(roundDiv);
            });
            
            container.appendChild(bracket);
            checkChampion();
        }

        function createPlayerElement(player, isWinner, onClick) {
            const el = document.createElement('div');
            el.className = `match-player ${isWinner ? 'winner' : ''} ${player.bye ? 'bye' : ''}`;
            el.textContent = player.name;
            
            if (!isWinner && !player.bye) {
                el.onclick = onClick;
            }
            return el;
        }

        function selectWinner(roundIdx, matchIdx, playerSide) {
            const match = tournament.rounds[roundIdx].matches[matchIdx];
            if (match.winner) return;
            
            match.winner = playerSide === 0 ? match.player1 : match.player2;
            
            // Advance winner
            if (roundIdx + 1 < tournament.rounds.length) {
                const nextRound = tournament.rounds[roundIdx + 1];
                const nextMatchIdx = Math.floor(matchIdx / 2);
                const nextMatch = nextRound.matches[nextMatchIdx];
                
                if (!nextMatch.player1 || nextMatch.player1 === null) {
                    nextMatch.player1 = match.winner;
                } else {
                    nextMatch.player2 = match.winner;
                }
            }
            
            renderBracket();
        }

        function checkChampion() {
            if (!tournament) return;
            const finalRound = tournament.rounds[tournament.rounds.length - 1];
            if (finalRound && finalRound.matches[0] && finalRound.matches[0].winner) {
                const champ = finalRound.matches[0].winner;
                document.getElementById('champion-display').innerHTML = `
                    <div class="champion">
                        🏆 CHAMPION 🏆<br>
                        ${champ.name}
                    </div>`;
                document.getElementById('champion-display').style.display = 'block';
            }
        }

        function undoLast() {
            if (!tournament) return;
            
            for (let r = tournament.rounds.length - 1; r >= 0; r--) {
                const round = tournament.rounds[r];
                for (let m = round.matches.length - 1; m >= 0; m--) {
                    if (round.matches[m].winner) {
                        round.matches[m].winner = null;
                        renderBracket();
                        return;
                    }
                }
            }
        }

        function resetDisplay() {
            document.getElementById('bracket-container').innerHTML = `
                <div class="empty-state">
                    <h2>Add fighters → Generate Bracket</h2>
                </div>`;
            document.getElementById('champion-display').style.display = 'none';
            document.getElementById('reset-btn').style.display = 'none';
            document.getElementById('undo-btn').style.display = 'none';
            tournament = null;
        }

        function resetTournament() {
            if (confirm("Start a new tournament?")) {
                participants = [];
                renderParticipants();
                resetDisplay();
            }
        }

        // Keyboard support
        document.getElementById('name-input').addEventListener('keypress', e => {
            if (e.key === 'Enter') addParticipant();
        });

        // Initial render
        renderParticipants();
    </script>
</body>
</html>
