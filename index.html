<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRACKET BATTLE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body {
            font-family: 'Press Start 2P', system-ui;
            background: #f8f8f8;
            margin: 0;
            padding: 20px;
        }
        
        header { text-align: center; margin-bottom: 25px; }
        h1 { color: #1a1a2e; font-size: 2.4rem; }
        
        .app {
            display: grid;
            grid-template-columns: 260px 1fr;
            gap: 30px;
        }
        
        .sidebar {
            background: white;
            border: 5px solid #111;
            padding: 20px;
            box-shadow: 6px 6px 0 #111;
        }
        
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border: 3px solid #00aa66;
        }
        
        button {
            width: 100%;
            padding: 12px;
            margin: 6px 0;
            font-family: inherit;
        }
        
        .bracket-area {
            background: white;
            border: 5px solid #111;
            padding: 30px;
            overflow-x: auto;
        }
        
        .bracket {
            display: flex;
            gap: 80px;
            justify-content: center;
            transform: scale(0.75); /* Zoomed out */
            transform-origin: top center;
        }
        
        .half {
            display: flex;
            flex-direction: column;
            gap: 55px;
        }
        
        .match {
            position: relative;
            width: 230px;
        }
        
        .player {
            background: white;
            border: 4px solid #222;
            padding: 14px 16px;
            margin: 10px 0;
            min-height: 56px;
            display: flex;
            align-items: center;
            cursor: pointer;
        }
        
        .player:hover { background: #f0f0f0; }
        .player.winner {
            background: #00ff9d;
            border-color: #00aa66;
        }
        .player.bye { color: #666; font-style: italic; }
        
        .vs {
            text-align: center;
            color: #555;
            margin: 4px 0;
        }
        
        .match::after {
            content: '';
            position: absolute;
            top: 50%;
            right: -45px;
            width: 45px;
            height: 4px;
            background: #222;
        }
        
        .round:not(:last-child) .match:not(:last-child)::before {
            content: '';
            position: absolute;
            top: 50%;
            right: -45px;
            width: 4px;
            height: calc(50% + 70px);
            background: #222;
        }
        
        .final {
            text-align: center;
            margin-top: 140px;
        }
    </style>
</head>
<body>
    <header><h1>BRACKET BATTLE</h1></header>
    
    <div class="app">
        <div class="sidebar">
            <h2>PARTICIPANTS</h2>
            <input type="text" id="name-input" placeholder="Enter name" onkeypress="if(event.key==='Enter') addParticipant()">
            <button onclick="addParticipant()">ADD</button>
            <button onclick="shuffleParticipants()">SHUFFLE</button>
            <button onclick="clearAll()">CLEAR</button>
            <div id="participants-list" style="margin-top:20px; max-height:480px; overflow-y:auto;"></div>
            <button onclick="generateBracket()" style="margin-top:20px; padding:18px; background:#111; color:white;">GENERATE BRACKET</button>
        </div>
        
        <div class="bracket-area" id="bracket-container"></div>
    </div>

    <script>
        let participants = [];
        let tournament = null;

        function addParticipant() {
            const input = document.getElementById('name-input');
            const name = input.value.trim();
            if (!name) return;
            if (participants.length >= 16) return alert("Max 16");
            participants.push({id: Date.now(), name});
            input.value = '';
            renderList();
        }

        function renderList() {
            const list = document.getElementById('participants-list');
            list.innerHTML = '';
            participants.forEach((p, i) => {
                const d = document.createElement('div');
                d.style.padding = '10px';
                d.style.background = '#f0f0f0';
                d.style.marginBottom = '6px';
                d.innerHTML = `${p.name} <button onclick="removeParticipant(${i})" style="float:right;background:#ff3366;color:white;border:none;">X</button>`;
                list.appendChild(d);
            });
        }

        function removeParticipant(i) {
            participants.splice(i, 1);
            renderList();
        }

        function shuffleParticipants() {
            for (let i = participants.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [participants[i], participants[j]] = [participants[j], participants[i]];
            }
            renderList();
        }

        function clearAll() {
            if (confirm("Clear all?")) {
                participants = [];
                renderList();
                document.getElementById('bracket-container').innerHTML = '<div style="text-align:center; padding:120px; color:#666;">Add players and generate bracket</div>';
            }
        }

        function generateBracket() {
            if (participants.length < 2) return alert("Need at least 2 players");
            
            let players = [...participants].sort(() => Math.random() - 0.5);
            const target = Math.pow(2, Math.ceil(Math.log2(players.length)));
            while (players.length < target) players.push({name: "BYE", bye: true});
            
            tournament = {rounds: []};
            let current = players;
            
            while (current.length > 1) {
                const matches = [];
                for (let i = 0; i < current.length; i += 2) {
                    matches.push({p1: current[i], p2: current[i+1], winner: null});
                }
                tournament.rounds.push({matches});
                current = new Array(current.length / 2).fill(null);
            }
            
            renderBracket();
        }

        function renderBracket() {
            const container = document.getElementById('bracket-container');
            container.innerHTML = `
                <div class="bracket">
                    <div class="half" id="left"></div>
                    <div class="final" id="final"></div>
                    <div class="half" id="right"></div>
                </div>
            `;
            
            const left = document.getElementById('left');
            const right = document.getElementById('right');
            const final = document.getElementById('final');
            
            const totalRounds = tournament.rounds.length;
            const mid = Math.ceil(totalRounds / 2);
            
            // Left side gets more if uneven
            tournament.rounds.slice(0, mid).forEach((r, i) => left.appendChild(createRound(r, i)));
            tournament.rounds.slice(mid).forEach((r, i) => right.appendChild(createRound(r, i + mid)));
            
            // Final
            const finalMatch = tournament.rounds[totalRounds - 1].matches[0];
            const fDiv = document.createElement('div');
            fDiv.className = 'match';
            fDiv.style.width = '290px';
            
            const p1 = createPlayer(finalMatch.p1, finalMatch.winner === finalMatch.p1, () => pickWinner(totalRounds-1, 0, 0));
            const vs = document.createElement('div');
            vs.className = 'vs';
            vs.textContent = 'VS';
            const p2 = createPlayer(finalMatch.p2, finalMatch.winner === finalMatch.p2, () => pickWinner(totalRounds-1, 0, 1));
            
            fDiv.append(p1, vs, p2);
            final.appendChild(fDiv);
        }

        function createRound(round, roundIndex) {
            const div = document.createElement('div');
            div.style.display = 'flex';
            div.style.flexDirection = 'column';
            div.style.gap = '50px';
            
            round.matches.forEach((match, mIdx) => {
                const mDiv = document.createElement('div');
                mDiv.className = 'match';
                
                const p1 = createPlayer(match.p1, match.winner === match.p1, () => pickWinner(roundIndex, mIdx, 0));
                const vs = document.createElement('div');
                vs.className = 'vs';
                vs.textContent = 'VS';
                const p2 = createPlayer(match.p2, match.winner === match.p2, () => pickWinner(roundIndex, mIdx, 1));
                
                mDiv.append(p1, vs, p2);
                div.appendChild(mDiv);
            });
            return div;
        }

        function createPlayer(player, isWinner, onClick) {
            const el = document.createElement('div');
            el.className = `player ${isWinner ? 'winner' : ''} ${player && player.bye ? 'bye' : ''}`;
            el.textContent = player ? player.name : "TBD";
            if (!isWinner && player && !player.bye) el.onclick = onClick;
            return el;
        }

        function pickWinner(roundIndex, matchIndex, side) {
            const match = tournament.rounds[roundIndex].matches[matchIndex];
            if (match.winner) return;
            
            match.winner = side === 0 ? match.p1 : match.p2;
            
            if (roundIndex + 1 < tournament.rounds.length) {
                const next = tournament.rounds[roundIndex + 1].matches[Math.floor(matchIndex / 2)];
                if (next) {
                    if (matchIndex % 2 === 0) next.p1 = match.winner;
                    else next.p2 = match.winner;
                }
            }
            renderBracket();
        }

        renderList();
    </script>
</body>
</html>
