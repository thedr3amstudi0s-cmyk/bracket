<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament Bracket</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body {
            font-family: 'Press Start 2P', system-ui;
            background: #f8f8f8;
            color: #111;
            margin: 0;
            padding: 20px;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        h1 {
            color: #1a1a2e;
            font-size: 2.5rem;
        }
        
        .sidebar {
            position: fixed;
            left: 30px;
            top: 120px;
            width: 260px;
            background: white;
            border: 4px solid #111;
            padding: 20px;
            box-shadow: 6px 6px 0 #111;
            z-index: 10;
        }
        
        .main-bracket {
            display: flex;
            justify-content: center;
            gap: 80px;
            margin-left: 320px;
        }
        
        .half {
            display: flex;
            flex-direction: column;
            gap: 90px;
        }
        
        .round {
            display: flex;
            flex-direction: column;
            gap: 65px;
        }
        
        .match {
            position: relative;
            width: 280px;
        }
        
        .player {
            background: white;
            border: 4px solid #222;
            padding: 16px 20px;
            margin: 12px 0;
            min-height: 62px;
            display: flex;
            align-items: center;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 3px 3px 0 #222;
        }
        
        .player:hover {
            background: #f0f0f0;
            border-color: #00aa66;
        }
        
        .player.winner {
            background: #00ff9d;
            border-color: #00aa66;
            color: #111;
        }
        
        .player.bye {
            color: #666;
            font-style: italic;
        }
        
        .vs {
            text-align: center;
            color: #444;
            margin: 6px 0;
        }
        
        /* Connecting Lines */
        .match::after {
            content: '';
            position: absolute;
            top: 50%;
            right: -45px;
            width: 45px;
            height: 4px;
            background: #222;
        }
        
        .round:not(:last-child) .match:not(:last-child)::before {
            content: '';
            position: absolute;
            top: 50%;
            right: -45px;
            width: 4px;
            height: calc(50% + 80px);
            background: #222;
        }
        
        .final-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
            margin-top: 80px;
        }
        
        .champion {
            font-size: 3rem;
            color: #1a1a2e;
            margin-top: 50px;
            text-align: center;
        }
    </style>
</head>
<body>
    <header>
        <h1>BRACKET BATTLE</h1>
    </header>

    <div class="sidebar">
        <h3>PARTICIPANTS</h3>
        <div style="display: flex; gap: 8px; margin: 15px 0;">
            <input type="text" id="name-input" placeholder="Enter name" style="flex:1; padding:12px;">
            <button onclick="addParticipant()" style="padding:12px 20px;">ADD</button>
        </div>
        <button onclick="shuffleParticipants()" style="width:100%; margin:6px 0;">SHUFFLE</button>
        <button onclick="clearAll()" style="width:100%; margin:6px 0; background:#ddd;">CLEAR ALL</button>
        <button onclick="generateBracket()" style="width:100%; padding:16px; margin-top:15px; background:#111; color:white; font-size:1.1rem;">GENERATE BRACKET</button>
        
        <div id="participants-list" style="margin-top:20px; max-height:450px; overflow-y:auto;"></div>
    </div>

    <div class="main-bracket" id="bracket-container">
        <!-- JS will fill this -->
    </div>

    <script>
        let participants = [];
        let tournament = null;

        function addParticipant() {
            const input = document.getElementById('name-input');
            const name = input.value.trim();
            if (!name) return;
            if (participants.length >= 16) return alert("Max 16 players for clean layout");
            participants.push({id: Date.now(), name});
            input.value = '';
            renderParticipantsList();
        }

        function renderParticipantsList() {
            const container = document.getElementById('participants-list');
            container.innerHTML = '';
            participants.forEach((p, i) => {
                const div = document.createElement('div');
                div.style.padding = '10px';
                div.style.borderBottom = '1px solid #ddd';
                div.innerHTML = `${p.name} <button onclick="removeParticipant(${i})" style="float:right;background:#ff3366;color:white;border:none;cursor:pointer;">X</button>`;
                container.appendChild(div);
            });
        }

        function removeParticipant(i) {
            participants.splice(i, 1);
            renderParticipantsList();
        }

        function shuffleParticipants() {
            for (let i = participants.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [participants[i], participants[j]] = [participants[j], participants[i]];
            }
            renderParticipantsList();
        }

        function clearAll() {
            if (confirm("Clear all participants?")) {
                participants = [];
                renderParticipantsList();
                document.getElementById('bracket-container').innerHTML = '<h2 style="margin-top:150px;color:#666;text-align:center">Add players on the left and click Generate Bracket</h2>';
            }
        }

        function generateBracket() {
            if (participants.length < 2) return alert("Need at least 2 players");
            
            let activePlayers = [...participants].sort(() => Math.random() - 0.5);
            
            // Pad to power of 2
            const targetSize = Math.pow(2, Math.ceil(Math.log2(activePlayers.length)));
            while (activePlayers.length < targetSize) {
                activePlayers.push({name: "BYE", bye: true});
            }
            
            tournament = { rounds: [] };
            let currentRound = activePlayers;
            
            while (currentRound.length > 1) {
                const matches = [];
                for (let i = 0; i < currentRound.length; i += 2) {
                    matches.push({
                        p1: currentRound[i],
                        p2: currentRound[i + 1],
                        winner: null
                    });
                }
                tournament.rounds.push({matches: matches});
                currentRound = new Array(currentRound.length / 2).fill(null);
            }
            
            renderBracket();
        }

        function renderBracket() {
            const container = document.getElementById('bracket-container');
            container.innerHTML = `
                <div style="display: flex; gap: 120px; align-items: flex-start;">
                    <!-- LEFT HALF -->
                    <div id="left-half" class="half"></div>
                    
                    <!-- FINAL -->
                    <div class="final-section" id="final-section">
                        <div style="font-size:1.4rem; margin-bottom:20px;">FINAL</div>
                        <div id="final-match" style="width:300px;"></div>
                    </div>
                    
                    <!-- RIGHT HALF -->
                    <div id="right-half" class="half"></div>
                </div>
            `;
            
            const left = document.getElementById('left-half');
            const right = document.getElementById('right-half');
            
            // Split rounds for left and right (simplified)
            const mid = Math.floor(tournament.rounds.length / 2);
            
            // Render Left Side
            tournament.rounds.slice(0, mid).forEach((round, idx) => {
                const roundDiv = createRound(round, idx);
                left.appendChild(roundDiv);
            });
            
            // Render Right Side
            tournament.rounds.slice(mid).forEach((round, idx) => {
                const roundDiv = createRound(round, idx + mid);
                right.appendChild(roundDiv);
            });
            
            // Final is handled separately in pickWinner logic
        }

        function createRound(round, roundIndex) {
            const roundDiv = document.createElement('div');
            roundDiv.className = 'round';
            
            round.matches.forEach((match, matchIndex) => {
                const matchDiv = document.createElement('div');
                matchDiv.className = 'match';
                
                const p1 = createPlayerElement(match.p1, match.winner === match.p1, () => pickWinner(roundIndex, matchIndex, 0));
                const vs = document.createElement('div');
                vs.className = 'vs';
                vs.textContent = 'VS';
                const p2 = createPlayerElement(match.p2, match.winner === match.p2, () => pickWinner(roundIndex, matchIndex, 1));
                
                matchDiv.appendChild(p1);
                matchDiv.appendChild(vs);
                matchDiv.appendChild(p2);
                roundDiv.appendChild(matchDiv);
            });
            
            return roundDiv;
        }

        function createPlayerElement(player, isWinner, onClick) {
            const el = document.createElement('div');
            el.className = 'player';
            
            if (!player) {
                el.textContent = "TBD";
                el.style.opacity = "0.4";
                return el;
            }
            
            if (isWinner) el.classList.add('winner');
            if (player.bye) el.classList.add('bye');
            
            el.textContent = player.name;
            
            if (!isWinner && !player.bye) {
                el.onclick = onClick;
            }
            
            return el;
        }

        function pickWinner(roundIdx, matchIdx, side) {
            const match = tournament.rounds[roundIdx].matches[matchIdx];
            if (match.winner) return;
            
            match.winner = side === 0 ? match.p1 : match.p2;
            
            // Advance
            if (roundIdx + 1 < tournament.rounds.length) {
                const nextMatch = tournament.rounds[roundIdx + 1].matches[Math.floor(matchIdx / 2)];
                if (nextMatch) {
                    if (matchIdx % 2 === 0) {
                        nextMatch.p1 = match.winner;
                    } else {
                        nextMatch.p2 = match.winner;
                    }
                }
            }
            
            renderBracket();
        }

        // Initialize
        renderParticipantsList();
    </script>
</body>
</html>
