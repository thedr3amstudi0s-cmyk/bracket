<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRACKET BATTLE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body {
            font-family: 'Press Start 2P', system-ui;
            background: #f8f8f8;
            color: #111;
            margin: 0;
            padding: 15px;
            font-size: 0.95rem;
        }
        
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 2rem; color: #1a1a2e; }
        
        .container {
            display: flex;
            gap: 20px;
        }
        
        .sidebar {
            width: 240px;
            background: white;
            border: 4px solid #111;
            padding: 15px;
            box-shadow: 5px 5px 0 #111;
            height: fit-content;
        }
        
        .main-bracket {
            flex: 1;
            display: flex;
            justify-content: center;
            gap: 40px;
            overflow-x: auto;
            padding: 20px;
        }
        
        .half {
            display: flex;
            flex-direction: column;
            gap: 45px;
        }
        
        .round {
            display: flex;
            flex-direction: column;
            gap: 38px;
        }
        
        .match {
            position: relative;
            width: 220px;
        }
        
        .player {
            background: white;
            border: 3px solid #222;
            padding: 12px 14px;
            margin: 8px 0;
            min-height: 52px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 2px 2px 0 #222;
        }
        
        .player:hover { background: #f0f0f0; }
        .player.winner {
            background: #00ff9d;
            border-color: #00aa66;
        }
        .player.bye {
            color: #666;
            font-style: italic;
        }
        
        .vs {
            text-align: center;
            color: #555;
            margin: 4px 0;
            font-size: 0.8rem;
        }
        
        /* Lines */
        .match::after {
            content: '';
            position: absolute;
            top: 50%;
            right: -35px;
            width: 35px;
            height: 3px;
            background: #222;
        }
        
        .round:not(:last-child) .match:not(:last-child)::before {
            content: '';
            position: absolute;
            top: 50%;
            right: -35px;
            width: 3px;
            height: calc(50% + 50px);
            background: #222;
        }
        
        .final {
            text-align: center;
            margin-top: 60px;
        }
        
        .champion {
            font-size: 2.4rem;
            margin-top: 40px;
            color: #1a1a2e;
        }
    </style>
</head>
<body>
    <header><h1>BRACKET BATTLE</h1></header>
    
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <h3>PARTICIPANTS</h3>
            <div style="display:flex; gap:6px; margin:12px 0;">
                <input type="text" id="name-input" placeholder="Name" style="flex:1; padding:10px;">
                <button onclick="addParticipant()">ADD</button>
            </div>
            <button onclick="shuffleParticipants()" style="width:100%; margin:5px 0;">SHUFFLE</button>
            <button onclick="clearAll()" style="width:100%; margin:5px 0; background:#ddd;">CLEAR</button>
            <button onclick="generateBracket()" style="width:100%; padding:14px; margin-top:12px; background:#111; color:white;">GENERATE BRACKET</button>
            
            <div id="participants-list" style="margin-top:15px; max-height:380px; overflow-y:auto;"></div>
        </div>
        
        <!-- Bracket -->
        <div class="main-bracket" id="bracket-container">
            <div style="margin-top:120px; color:#666; text-align:center;">
                Add players on the left and click Generate Bracket
            </div>
        </div>
    </div>

    <script>
        let participants = [];
        let tournament = null;

        function addParticipant() {
            const input = document.getElementById('name-input');
            const name = input.value.trim();
            if (!name) return;
            if (participants.length >= 16) return alert("Max 16 players");
            participants.push({id: Date.now(), name});
            input.value = '';
            renderList();
        }

        function renderList() {
            const list = document.getElementById('participants-list');
            list.innerHTML = '';
            participants.forEach((p, i) => {
                const d = document.createElement('div');
                d.style.padding = '8px';
                d.style.borderBottom = '1px solid #ddd';
                d.innerHTML = `${p.name} <button onclick="removeParticipant(${i})" style="float:right;background:#ff3366;color:white;border:none;">X</button>`;
                list.appendChild(d);
            });
        }

        function removeParticipant(i) {
            participants.splice(i, 1);
            renderList();
        }

        function shuffleParticipants() {
            for (let i = participants.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [participants[i], participants[j]] = [participants[j], participants[i]];
            }
            renderList();
        }

        function clearAll() {
            if (confirm("Clear everything?")) {
                participants = [];
                renderList();
                document.getElementById('bracket-container').innerHTML = `<div style="margin-top:120px; color:#666; text-align:center;">Add players and click Generate Bracket</div>`;
            }
        }

        function generateBracket() {
            if (participants.length < 2) return alert("Need at least 2 players");
            
            let players = [...participants].sort(() => Math.random() - 0.5);
            const target = Math.pow(2, Math.ceil(Math.log2(players.length)));
            while (players.length < target) players.push({name: "BYE", bye: true});
            
            tournament = {rounds: []};
            let current = players;
            
            while (current.length > 1) {
                const matches = [];
                for (let i = 0; i < current.length; i += 2) {
                    matches.push({
                        p1: current[i],
                        p2: current[i+1],
                        winner: null
                    });
                }
                tournament.rounds.push({matches});
                current = new Array(current.length / 2).fill(null);
            }
            
            renderBracket();
        }

        function renderBracket() {
            const container = document.getElementById('bracket-container');
            container.innerHTML = `
                <div style="display:flex; gap:60px; align-items:flex-start;">
                    <!-- LEFT -->
                    <div id="left" class="half"></div>
                    
                    <!-- FINAL -->
                    <div style="text-align:center; min-width:280px; margin-top:80px;">
                        <div style="font-size:1.3rem; margin-bottom:15px;">FINAL</div>
                        <div id="final" style="width:260px;"></div>
                    </div>
                    
                    <!-- RIGHT -->
                    <div id="right" class="half"></div>
                </div>
            `;
            
            const left = document.getElementById('left');
            const right = document.getElementById('right');
            
            const halfPoint = Math.ceil(tournament.rounds.length / 2);
            
            // Left side
            tournament.rounds.slice(0, halfPoint).forEach((round, i) => {
                left.appendChild(createRound(round, i));
            });
            
            // Right side
            tournament.rounds.slice(halfPoint).forEach((round, i) => {
                right.appendChild(createRound(round, i + halfPoint));
            });
        }

        function createRound(round, roundIndex) {
            const rDiv = document.createElement('div');
            rDiv.className = 'round';
            
            round.matches.forEach((match, mIdx) => {
                const mDiv = document.createElement('div');
                mDiv.className = 'match';
                
                const p1 = createPlayer(match.p1, match.winner === match.p1, () => pickWinner(roundIndex, mIdx, 0));
                const vs = document.createElement('div');
                vs.className = 'vs';
                vs.textContent = 'VS';
                const p2 = createPlayer(match.p2, match.winner === match.p2, () => pickWinner(roundIndex, mIdx, 1));
                
                mDiv.append(p1, vs, p2);
                rDiv.appendChild(mDiv);
            });
            return rDiv;
        }

        function createPlayer(player, isWinner, onClick) {
            const el = document.createElement('div');
            el.className = 'player';
            if (!player) {
                el.textContent = "TBD";
                el.style.opacity = "0.3";
                return el;
            }
            if (isWinner) el.classList.add('winner');
            if (player.bye) el.classList.add('bye');
            el.textContent = player.name;
            if (!isWinner && !player.bye) el.onclick = onClick;
            return el;
        }

        function pickWinner(roundIdx, matchIdx, side) {
            const match = tournament.rounds[roundIdx].matches[matchIdx];
            if (match.winner) return;
            
            match.winner = side === 0 ? match.p1 : match.p2;
            
            if (roundIdx + 1 < tournament.rounds.length) {
                const nextMatch = tournament.rounds[roundIdx + 1].matches[Math.floor(matchIdx / 2)];
                if (nextMatch) {
                    if (matchIdx % 2 === 0) nextMatch.p1 = match.winner;
                    else nextMatch.p2 = match.winner;
                }
            }
            renderBracket();
        }

        renderList();
    </script>
</body>
</html>
