<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRACKET BATTLE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body {
            font-family: 'Press Start 2P', system-ui;
            background: #f8f8f8;
            margin: 0;
            padding: 20px;
        }
        
        header { text-align: center; margin-bottom: 30px; }
        h1 { color: #1a1a2e; font-size: 2.6rem; }
        
        .app {
            display: flex;
            gap: 25px;
            max-width: 1600px;
            margin: 0 auto;
        }
        
        .sidebar {
            width: 260px;
            background: white;
            border: 5px solid #111;
            padding: 20px;
            box-shadow: 6px 6px 0 #111;
        }
        
        .bracket-wrapper {
            flex: 1;
            display: flex;
            gap: 80px;
            justify-content: center;
            overflow-x: auto;
            padding: 30px;
        }
        
        .half {
            display: flex;
            flex-direction: column;
            gap: 70px;
        }
        
        .match {
            position: relative;
            width: 240px;
        }
        
        .player {
            background: white;
            border: 4px solid #222;
            padding: 16px;
            margin: 12px 0;
            min-height: 58px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .player:hover { background: #f0f0f0; }
        .player.winner {
            background: #00ff9d;
            border-color: #00aa66;
        }
        .player.bye { color: #666; font-style: italic; }
        
        .vs {
            text-align: center;
            color: #555;
            margin: 6px 0;
        }
        
        /* Lines */
        .match::after {
            content: '';
            position: absolute;
            top: 50%;
            right: -45px;
            width: 45px;
            height: 4px;
            background: #222;
        }
        
        .round:not(:last-child) .match:not(:last-child)::before {
            content: '';
            position: absolute;
            top: 50%;
            right: -45px;
            width: 4px;
            height: calc(50% + 80px);
            background: #222;
        }
        
        .final {
            text-align: center;
            margin-top: 120px;
        }
    </style>
</head>
<body>
    <header><h1>BRACKET BATTLE</h1></header>
    
    <div class="app">
        <!-- Sidebar -->
        <div class="sidebar">
            <h2>PARTICIPANTS</h2>
            <input type="text" id="name-input" placeholder="Enter name" style="width:100%; padding:12px; margin-bottom:10px;">
            <button onclick="addParticipant()" style="width:100%; margin-bottom:8px;">ADD</button>
            <button onclick="shuffleParticipants()" style="width:100%; margin-bottom:8px;">SHUFFLE</button>
            <button onclick="clearAll()" style="width:100%; background:#ddd;">CLEAR</button>
            
            <div id="participants-list" style="margin-top:20px; max-height:500px; overflow-y:auto;"></div>
            
            <button onclick="generateBracket()" style="width:100%; margin-top:25px; padding:18px; background:#111; color:white; font-size:1.1rem;">
                GENERATE BRACKET
            </button>
        </div>
        
        <!-- Bracket -->
        <div class="bracket-wrapper" id="bracket-container">
            <!-- JS will fill this -->
        </div>
    </div>

    <script>
        let participants = [];
        let tournament = null;

        function addParticipant() {
            const input = document.getElementById('name-input');
            const name = input.value.trim();
            if (!name) return;
            if (participants.length >= 16) return alert("Max 16 players");
            participants.push({id: Date.now(), name});
            input.value = '';
            renderList();
        }

        function renderList() {
            const list = document.getElementById('participants-list');
            list.innerHTML = '';
            participants.forEach((p, i) => {
                const d = document.createElement('div');
                d.style.padding = '10px';
                d.style.background = '#f0f0f0';
                d.style.marginBottom = '6px';
                d.innerHTML = `${p.name} <button onclick="removeParticipant(${i})" style="float:right; background:#ff3366; color:white; border:none;">X</button>`;
                list.appendChild(d);
            });
        }

        function removeParticipant(i) {
            participants.splice(i, 1);
            renderList();
        }

        function shuffleParticipants() {
            for (let i = participants.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [participants[i], participants[j]] = [participants[j], participants[i]];
            }
            renderList();
        }

        function clearAll() {
            if (confirm("Clear all?")) {
                participants = [];
                renderList();
                document.getElementById('bracket-container').innerHTML = '<div style="text-align:center; margin-top:150px; color:#666;">Add players and generate bracket</div>';
            }
        }

        function generateBracket() {
            if (participants.length < 2) return alert("Need at least 2 players");
            
            let players = [...participants].sort(() => Math.random() - 0.5);
            const target = Math.pow(2, Math.ceil(Math.log2(players.length)));
            while (players.length < target) players.push({name: "BYE", bye: true});
            
            tournament = {rounds: []};
            let current = players;
            
            while (current.length > 1) {
                const matches = [];
                for (let i = 0; i < current.length; i += 2) {
                    matches.push({p1: current[i], p2: current[i+1], winner: null});
                }
                tournament.rounds.push({matches});
                current = new Array(current.length / 2).fill(null);
            }
            
            renderBracket();
        }

        function renderBracket() {
            const container = document.getElementById('bracket-container');
            container.innerHTML = `
                <div style="display: flex; gap: 100px; justify-content: center;">
                    <!-- LEFT SIDE -->
                    <div class="half" id="left-side"></div>
                    
                    <!-- FINAL -->
                    <div class="final" id="final-section"></div>
                    
                    <!-- RIGHT SIDE -->
                    <div class="half" id="right-side"></div>
                </div>
            `;
            
            const left = document.getElementById('left-side');
            const right = document.getElementById('right-side');
            const finalSection = document.getElementById('final-section');
            
            const mid = Math.ceil(tournament.rounds.length / 2);
            
            // Left Half
            tournament.rounds.slice(0, mid).forEach((round, idx) => {
                left.appendChild(createRound(round, idx));
            });
            
            // Right Half
            tournament.rounds.slice(mid).forEach((round, idx) => {
                right.appendChild(createRound(round, idx + mid));
            });
            
            // Final
            const finalMatch = tournament.rounds[tournament.rounds.length - 1].matches[0];
            const finalDiv = document.createElement('div');
            finalDiv.className = 'match';
            finalDiv.style.width = '300px';
            
            const p1 = createPlayer(finalMatch.p1, finalMatch.winner === finalMatch.p1, () => pickWinner(tournament.rounds.length - 1, 0, 0));
            const vs = document.createElement('div');
            vs.className = 'vs';
            vs.textContent = 'VS';
            const p2 = createPlayer(finalMatch.p2, finalMatch.winner === finalMatch.p2, () => pickWinner(tournament.rounds.length - 1, 0, 1));
            
            finalDiv.append(p1, vs, p2);
            finalSection.appendChild(finalDiv);
        }

        function createRound(round, roundIndex) {
            const roundDiv = document.createElement('div');
            roundDiv.style.display = 'flex';
            roundDiv.style.flexDirection = 'column';
            roundDiv.style.gap = '55px';
            
            round.matches.forEach((match, mIdx) => {
                const matchDiv = document.createElement('div');
                matchDiv.className = 'match';
                
                const p1 = createPlayer(match.p1, match.winner === match.p1, () => pickWinner(roundIndex, mIdx, 0));
                const vs = document.createElement('div');
                vs.className = 'vs';
                vs.textContent = 'VS';
                const p2 = createPlayer(match.p2, match.winner === match.p2, () => pickWinner(roundIndex, mIdx, 1));
                
                matchDiv.append(p1, vs, p2);
                roundDiv.appendChild(matchDiv);
            });
            
            return roundDiv;
        }

        function createPlayer(player, isWinner, onClick) {
            const el = document.createElement('div');
            el.className = `player ${isWinner ? 'winner' : ''} ${player && player.bye ? 'bye' : ''}`;
            el.textContent = player ? player.name : "TBD";
            if (!isWinner && player && !player.bye) el.onclick = onClick;
            return el;
        }

        function pickWinner(roundIndex, matchIndex, side) {
            const match = tournament.rounds[roundIndex].matches[matchIndex];
            if (match.winner) return;
            
            match.winner = side === 0 ? match.p1 : match.p2;
            
            if (roundIndex + 1 < tournament.rounds.length) {
                const nextMatch = tournament.rounds[roundIndex + 1].matches[Math.floor(matchIndex / 2)];
                if (nextMatch) {
                    if (matchIndex % 2 === 0) nextMatch.p1 = match.winner;
                    else nextMatch.p2 = match.winner;
                }
            }
            renderBracket();
        }

        renderList();
    </script>
</body>
</html>
