<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRACKET BATTLE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        :root {
            --bg: #0f0f1a;
            --line: #00ff9d;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Press Start 2P', system-ui;
            background: #f4f4f4;
            color: #111;
            line-height: 1.4;
        }
        
        header {
            background: #1a1a2e;
            color: white;
            padding: 25px;
            text-align: center;
            border-bottom: 6px solid var(--line);
        }
        
        h1 {
            font-size: 2.8rem;
            text-shadow: 4px 4px 0 #000;
        }
        
        .app {
            display: flex;
            min-height: calc(100vh - 100px);
        }
        
        .sidebar {
            width: 280px;
            background: #1a1a2e;
            color: white;
            padding: 25px;
            border-right: 6px solid var(--line);
        }
        
        .input-area {
            display: flex;
            margin-bottom: 20px;
        }
        
        input {
            flex: 1;
            padding: 15px;
            font-family: inherit;
            border: 3px solid var(--line);
            background: #16213e;
            color: white;
        }
        
        button {
            font-family: inherit;
            padding: 15px 20px;
            background: var(--line);
            color: #111;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        
        .list {
            background: #16213e;
            border: 3px solid var(--line);
            padding: 10px;
            max-height: 55vh;
            overflow-y: auto;
        }
        
        .participant {
            padding: 12px;
            background: #253366;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }
        
        .bracket-area {
            flex: 1;
            padding: 30px;
            overflow: auto;
        }
        
        .bracket {
            display: flex;
            gap: 70px;
            justify-content: center;
        }
        
        .half {
            display: flex;
            flex-direction: column;
            gap: 80px;
        }
        
        .round {
            display: flex;
            flex-direction: column;
            gap: 55px;
        }
        
        .round-label {
            color: #111;
            text-align: center;
            font-size: 1.1rem;
            margin-bottom: 15px;
        }
        
        .match {
            position: relative;
            width: 245px;
        }
        
        .player-box {
            background: white;
            border: 4px solid #222;
            padding: 16px 18px;
            margin: 10px 0;
            min-height: 58px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: all 0.25s;
            box-shadow: 4px 4px 0 #222;
        }
        
        .player-box:hover {
            transform: translateY(-2px);
        }
        
        .player-box.winner {
            background: #00ff9d;
            border-color: #00aa66;
            color: #111;
        }
        
        .player-box.bye {
            color: #666;
            font-style: italic;
        }
        
        .vs {
            text-align: center;
            color: #444;
            font-size: 0.85rem;
            margin: 4px 0;
        }
        
        /* Lines */
        .match::after {
            content: '';
            position: absolute;
            top: 50%;
            right: -48px;
            width: 48px;
            height: 4px;
            background: #222;
        }
        
        .round:not(:last-child) .match:not(:last-child)::before {
            content: '';
            position: absolute;
            right: -48px;
            top: 50%;
            width: 4px;
            height: calc(50% + 70px);
            background: #222;
        }
        
        .final {
            text-align: center;
            margin: 80px 0 40px;
        }
        
        .final .match {
            width: 320px;
            margin: 0 auto;
        }
        
        .champion {
            font-size: 3rem;
            color: #1a1a2e;
            text-align: center;
            margin-top: 60px;
        }
        
        .footer {
            text-align: center;
            padding: 20px;
            color: #666;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>BRACKET BATTLE</h1>
    </header>
    
    <div class="app">
        <!-- SIDEBAR -->
        <div class="sidebar">
            <h2 style="margin-bottom: 20px; color: #00ff9d;">PLAYERS</h2>
            
            <div class="input-area">
                <input type="text" id="name-input" placeholder="Enter name..." maxlength="22">
                <button onclick="addParticipant()">ADD</button>
            </div>
            
            <div style="display: flex; gap: 10px; margin: 15px 0;">
                <button onclick="shuffleParticipants()" style="flex: 1;">SHUFFLE</button>
                <button onclick="clearAll()" style="flex: 1; background: #444; color: white;">CLEAR</button>
            </div>
            
            <div class="list" id="participants-list"></div>
            
            <button onclick="generateBracket()" style="width: 100%; margin-top: 25px; padding: 18px; font-size: 1.1rem;">
                GENERATE BRACKET
            </button>
        </div>
        
        <!-- BRACKET AREA -->
        <div class="bracket-area">
            <div id="bracket-container" style="min-height: 700px;">
                <div style="text-align:center; padding: 120px 40px; color:#666;">
                    <h2>Add players on the left</h2>
                    <p>Then click "GENERATE BRACKET"</p>
                </div>
            </div>
        </div>
    </div>
    
    <div class="footer">
        Single Elimination Tournament • Byes for odd numbers
    </div>

    <script>
        let participants = [];
        let tournament = null;

        function addParticipant() {
            const input = document.getElementById('name-input');
            const name = input.value.trim();
            if (!name) return;
            if (participants.length >= 16) return alert("Maximum 16 players supported");
            participants.push({ id: Date.now(), name: name });
            input.value = '';
            renderParticipants();
        }

        function renderParticipants() {
            const container = document.getElementById('participants-list');
            container.innerHTML = '';
            
            if (participants.length === 0) {
                container.innerHTML = '<div style="padding:20px; text-align:center; color:#777;">No players yet...</div>';
                return;
            }
            
            participants.forEach((p, index) => {
                const div = document.createElement('div');
                div.className = 'participant';
                div.innerHTML = `
                    <span>${p.name}</span>
                    <button onclick="removeParticipant(${index})" style="background:#ff3366; color:white; border:none; padding:4px 10px; cursor:pointer;">X</button>
                `;
                container.appendChild(div);
            });
        }

        function removeParticipant(index) {
            participants.splice(index, 1);
            renderParticipants();
        }

        function shuffleParticipants() {
            for (let i = participants.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [participants[i], participants[j]] = [participants[j], participants[i]];
            }
            renderParticipants();
        }

        function clearAll() {
            if (confirm("Clear all players?")) {
                participants = [];
                renderParticipants();
                resetBracket();
            }
        }

        function generateBracket() {
            if (participants.length < 2) {
                alert("You need at least 2 players to generate a bracket!");
                return;
            }
            
            let active = [...participants].sort(() => Math.random() - 0.5);
            
            // Pad to power of 2
            const size = Math.pow(2, Math.ceil(Math.log2(active.length)));
            while (active.length < size) {
                active.push({ name: "BYE", bye: true });
            }
            
            tournament = { rounds: [] };
            let roundPlayers = active;
            
            while (roundPlayers.length > 1) {
                const matches = [];
                for (let i = 0; i < roundPlayers.length; i += 2) {
                    matches.push({
                        p1: roundPlayers[i],
                        p2: roundPlayers[i + 1],
                        winner: null
                    });
                }
                tournament.rounds.push({ matches: matches });
                roundPlayers = new Array(roundPlayers.length / 2).fill(null);
            }
            
            renderBracket();
        }

        function renderBracket() {
            const container = document.getElementById('bracket-container');
            container.innerHTML = `
                <div class="bracket">
                    <!-- LEFT HALF -->
                    <div class="half" id="left-half"></div>
                    
                    <!-- FINAL -->
                    <div class="final" id="final-area"></div>
                    
                    <!-- RIGHT HALF -->
                    <div class="half" id="right-half"></div>
                </div>
            `;
            
            const leftHalf = document.getElementById('left-half');
            const rightHalf = document.getElementById('right-half');
            const finalArea = document.getElementById('final-area');
            
            const mid = Math.ceil(tournament.rounds.length / 2);
            
            // Left Side
            tournament.rounds.slice(0, mid).forEach((round, rIdx) => {
                const roundDiv = createRoundElement(round, rIdx);
                leftHalf.appendChild(roundDiv);
            });
            
            // Right Side
            tournament.rounds.slice(mid).forEach((round, rIdx) => {
                const roundDiv = createRoundElement(round, rIdx);
                rightHalf.appendChild(roundDiv);
            });
            
            // Final
            const finalRound = tournament.rounds[tournament.rounds.length - 1];
            if (finalRound) {
                const finalMatch = finalRound.matches[0];
                const finalDiv = document.createElement('div');
                finalDiv.className = 'match';
                finalDiv.style.width = '320px';
                
                const p1 = createPlayerElement(finalMatch.p1, finalMatch.winner === finalMatch.p1, () => pickWinner(tournament.rounds.length - 1, 0, 0));
                const vs = document.createElement('div');
                vs.className = 'vs';
                vs.textContent = 'VS';
                const p2 = createPlayerElement(finalMatch.p2, finalMatch.winner === finalMatch.p2, () => pickWinner(tournament.rounds.length - 1, 0, 1));
                
                finalDiv.append(p1, vs, p2);
                finalArea.appendChild(finalDiv);
            }
        }

        function createRoundElement(round, roundIndex) {
            const roundDiv = document.createElement('div');
            roundDiv.className = 'round';
            
            const label = document.createElement('div');
            label.className = 'round-label';
            label.textContent = roundIndex === tournament.rounds.length - 1 ? "FINAL" : `ROUND ${roundIndex + 1}`;
            roundDiv.appendChild(label);
            
            round.matches.forEach((match, matchIndex) => {
                const matchDiv = document.createElement('div');
                matchDiv.className = 'match';
                
                const p1 = createPlayerElement(match.p1, match.winner === match.p1, () => pickWinner(roundIndex, matchIndex, 0));
                const vs = document.createElement('div');
                vs.className = 'vs';
                vs.textContent = 'VS';
                const p2 = createPlayerElement(match.p2, match.winner === match.p2, () => pickWinner(roundIndex, matchIndex, 1));
                
                matchDiv.appendChild(p1);
                matchDiv.appendChild(vs);
                matchDiv.appendChild(p2);
                roundDiv.appendChild(matchDiv);
            });
            
            return roundDiv;
        }

        function createPlayerElement(player, isWinner, onClick) {
            const el = document.createElement('div');
            el.className = 'player-box';
            
            if (!player) {
                el.textContent = "TBD";
                el.style.opacity = "0.4";
                return el;
            }
            
            if (isWinner) el.classList.add('winner');
            if (player.bye) el.classList.add('bye');
            
            el.textContent = player.name;
            
            if (!isWinner && !player.bye) {
                el.onclick = onClick;
            }
            
            return el;
        }

        function pickWinner(roundIndex, matchIndex, side) {
            const match = tournament.rounds[roundIndex].matches[matchIndex];
            if (match.winner) return;
            
            match.winner = side === 0 ? match.p1 : match.p2;
            
            if (roundIndex + 1 < tournament.rounds.length) {
                const nextMatch = tournament.rounds[roundIndex + 1].matches[Math.floor(matchIndex / 2)];
                if (nextMatch) {
                    if (matchIndex % 2 === 0) {
                        nextMatch.p1 = match.winner;
                    } else {
                        nextMatch.p2 = match.winner;
                    }
                }
            }
            
            renderBracket();
        }

        function resetBracket() {
            const container = document.getElementById('bracket-container');
            container.innerHTML = `
                <div style="text-align:center; padding:120px 40px; color:#666;">
                    <h2>Add players on the left</h2>
                    <p>Then click "GENERATE BRACKET"</p>
                </div>
            `;
            tournament = null;
        }

        // Init
        renderParticipants();
    </script>
</body>
</html>
