<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRACKET BATTLE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body {
            font-family: 'Press Start 2P', system-ui;
            background: #f8f8f8;
            margin: 0;
            padding: 20px;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        h1 {
            color: #1a1a2e;
            font-size: 2.5rem;
        }
        
        .app {
            display: flex;
            gap: 30px;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .sidebar {
            width: 260px;
            background: white;
            border: 4px solid #111;
            padding: 20px;
            box-shadow: 6px 6px 0 #111;
        }
        
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border: 3px solid #00aa66;
        }
        
        button {
            width: 100%;
            padding: 12px;
            margin: 5px 0;
            font-family: inherit;
            cursor: pointer;
        }
        
        .list {
            margin-top: 15px;
            max-height: 500px;
            overflow-y: auto;
        }
        
        .participant {
            padding: 10px;
            background: #f0f0f0;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
        }
        
        .bracket-container {
            flex: 1;
            overflow-x: auto;
            padding: 20px;
        }
        
        .bracket {
            display: flex;
            gap: 50px;
            align-items: flex-start;
        }
        
        .half {
            display: flex;
            flex-direction: column;
            gap: 60px;
        }
        
        .match {
            position: relative;
            width: 230px;
        }
        
        .player {
            background: white;
            border: 4px solid #222;
            padding: 14px 16px;
            margin: 10px 0;
            min-height: 55px;
            display: flex;
            align-items: center;
            cursor: pointer;
        }
        
        .player.winner {
            background: #00ff9d;
            border-color: #00aa66;
        }
        
        .player.bye {
            color: #666;
            font-style: italic;
        }
        
        .vs {
            text-align: center;
            color: #555;
            margin: 4px 0;
        }
        
        .match::after {
            content: '';
            position: absolute;
            top: 50%;
            right: -40px;
            width: 40px;
            height: 4px;
            background: #222;
        }
        
        .round:not(:last-child) .match:not(:last-child)::before {
            content: '';
            position: absolute;
            top: 50%;
            right: -40px;
            width: 4px;
            height: calc(50% + 65px);
            background: #222;
        }
        
        .champion {
            text-align: center;
            font-size: 2.8rem;
            margin: 60px 0;
            color: #1a1a2e;
        }
    </style>
</head>
<body>
    <header><h1>BRACKET BATTLE</h1></header>
    
    <div class="app">
        <!-- Sidebar -->
        <div class="sidebar">
            <h2>PARTICIPANTS</h2>
            <input type="text" id="name-input" placeholder="Enter name">
            <button onclick="addParticipant()">ADD PLAYER</button>
            <button onclick="shuffleParticipants()">SHUFFLE</button>
            <button onclick="clearAll()">CLEAR ALL</button>
            
            <div class="list" id="participants-list"></div>
            
            <button onclick="generateBracket()" style="margin-top:20px; padding:18px; background:#111; color:white;">
                GENERATE BRACKET
            </button>
        </div>
        
        <!-- Bracket -->
        <div class="bracket-container" id="bracket-container">
            <div style="text-align:center; padding:100px; color:#666;">
                Add players on the left → Click Generate Bracket
            </div>
        </div>
    </div>

    <script>
        let participants = [];
        let tournament = null;

        function addParticipant() {
            const input = document.getElementById('name-input');
            const name = input.value.trim();
            if (!name) return;
            participants.push({id: Date.now(), name});
            input.value = '';
            renderList();
        }

        function renderList() {
            const list = document.getElementById('participants-list');
            list.innerHTML = '';
            participants.forEach((p, i) => {
                const div = document.createElement('div');
                div.className = 'participant';
                div.innerHTML = `${p.name} <button onclick="removeParticipant(${i})" style="background:#ff3366;color:white;border:none;">X</button>`;
                list.appendChild(div);
            });
        }

        function removeParticipant(i) {
            participants.splice(i, 1);
            renderList();
        }

        function shuffleParticipants() {
            for (let i = participants.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [participants[i], participants[j]] = [participants[j], participants[i]];
            }
            renderList();
        }

        function clearAll() {
            if (confirm("Clear all players?")) {
                participants = [];
                renderList();
                resetBracket();
            }
        }

        function generateBracket() {
            if (participants.length < 2) return alert("Need at least 2 players!");
            
            let players = [...participants].sort(() => Math.random() - 0.5);
            const target = Math.pow(2, Math.ceil(Math.log2(players.length)));
            while (players.length < target) players.push({name: "BYE", bye: true});
            
            tournament = {rounds: []};
            let current = players;
            
            while (current.length > 1) {
                const matches = [];
                for (let i = 0; i < current.length; i += 2) {
                    matches.push({
                        p1: current[i],
                        p2: current[i+1],
                        winner: null
                    });
                }
                tournament.rounds.push({matches});
                current = new Array(current.length / 2).fill(null);
            }
            
            renderBracket();
        }

        function renderBracket() {
            const container = document.getElementById('bracket-container');
            container.innerHTML = `
                <div class="bracket">
                    <div class="half" id="left"></div>
                    <div style="text-align:center; margin-top:120px;">
                        <div style="font-size:1.4rem;">FINAL</div>
                        <div id="final" style="width:260px; margin:20px auto;"></div>
                    </div>
                    <div class="half" id="right"></div>
                </div>
            `;
            
            const left = document.getElementById('left');
            const right = document.getElementById('right');
            
            const mid = Math.ceil(tournament.rounds.length / 2);
            
            tournament.rounds.slice(0, mid).forEach((r, i) => left.appendChild(createRound(r, i)));
            tournament.rounds.slice(mid).forEach((r, i) => right.appendChild(createRound(r, i + mid)));
        }

        function createRound(round, roundIndex) {
            const div = document.createElement('div');
            div.style.display = 'flex';
            div.style.flexDirection = 'column';
            div.style.gap = '50px';
            
            round.matches.forEach((match, idx) => {
                const m = document.createElement('div');
                m.className = 'match';
                
                const p1 = createPlayer(match.p1, match.winner === match.p1, () => pickWinner(roundIndex, idx, 0));
                const vs = document.createElement('div');
                vs.className = 'vs';
                vs.textContent = 'VS';
                const p2 = createPlayer(match.p2, match.winner === match.p2, () => pickWinner(roundIndex, idx, 1));
                
                m.append(p1, vs, p2);
                div.appendChild(m);
            });
            return div;
        }

        function createPlayer(player, isWinner, onClick) {
            const el = document.createElement('div');
            el.className = `player ${isWinner ? 'winner' : ''} ${player && player.bye ? 'bye' : ''}`;
            el.textContent = player ? player.name : "TBD";
            if (!isWinner && player && !player.bye) el.onclick = onClick;
            return el;
        }

        function pickWinner(roundIndex, matchIndex, side) {
            const match = tournament.rounds[roundIndex].matches[matchIndex];
            if (match.winner) return;
            
            match.winner = side === 0 ? match.p1 : match.p2;
            
            if (roundIndex + 1 < tournament.rounds.length) {
                const next = tournament.rounds[roundIndex + 1].matches[Math.floor(matchIndex / 2)];
                if (next) {
                    if (matchIndex % 2 === 0) next.p1 = match.winner;
                    else next.p2 = match.winner;
                }
            }
            renderBracket();
        }

        function resetBracket() {
            document.getElementById('bracket-container').innerHTML = `
                <div style="text-align:center; padding:100px; color:#666;">
                    Add players on the left → Click Generate Bracket
                </div>`;
        }

        // Init
        renderList();
    </script>
</body>
</html>
