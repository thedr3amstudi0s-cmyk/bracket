<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament Bracket</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        :root {
            --bg: #0a0a1f;
            --accent: #00ff9d;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Press Start 2P', system-ui;
            background: var(--bg);
            color: #ddd;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        header {
            background: #1a1a2e;
            padding: 20px;
            text-align: center;
            border-bottom: 4px solid var(--accent);
        }
        
        h1 { font-size: 2.4rem; text-shadow: 0 0 15px var(--accent); }
        
        .container { display: flex; flex: 1; overflow: hidden; }
        
        .sidebar {
            width: 300px;
            background: #1a1a2e;
            padding: 20px;
            border-right: 4px solid var(--accent);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .input-area { display: flex; gap: 8px; }
        input {
            flex: 1;
            padding: 14px;
            background: #16213e;
            border: 2px solid var(--accent);
            color: white;
            font-family: inherit;
        }
        
        button {
            font-family: inherit;
            padding: 14px 18px;
            background: var(--accent);
            color: #0a0a1f;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background: #00cc7a; }
        
        .participants-list {
            flex: 1;
            background: #16213e;
            border: 2px solid var(--accent);
            padding: 10px;
            overflow-y: auto;
        }
        
        .participant {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            background: #1e2a4d;
            margin-bottom: 6px;
        }
        
        .remove-btn { background: #ff3366; color: white; padding: 2px 8px; font-size: 0.8rem; }
        
        .main-area {
            flex: 1;
            padding: 20px;
            overflow: auto;
            position: relative;
        }
        
        .controls { margin-bottom: 20px; }
        
        .bracket {
            display: flex;
            gap: 60px;
            position: relative;
        }
        
        .round {
            display: flex;
            flex-direction: column;
            gap: 70px;
            position: relative;
        }
        
        .round-header {
            text-align: center;
            color: var(--accent);
            margin-bottom: 30px;
            font-size: 1.1rem;
        }
        
        .match {
            background: #16213e;
            border: 3px solid var(--accent);
            padding: 10px;
            width: 220px;
            position: relative;
            min-height: 92px;
        }
        
        .player {
            padding: 10px 12px;
            margin: 4px 0;
            background: #1e2a4d;
            cursor: pointer;
            transition: 0.2s;
            min-height: 32px;
            display: flex;
            align-items: center;
        }
        
        .player:hover { background: #2a3a66; }
        .player.winner { 
            background: var(--accent); 
            color: #0a0a1f; 
            font-weight: bold; 
        }
        .player.bye { color: #7777aa; font-style: italic; }
        
        .vs {
            text-align: center;
            color: #555;
            font-size: 0.75rem;
            padding: 2px;
        }
        
        /* Connecting Lines */
        .round:not(:last-child)::after {
            content: '';
            position: absolute;
            top: 50%;
            right: -30px;
            width: 30px;
            height: 2px;
            background: var(--accent);
            opacity: 0.4;
        }
        
        .match:not(:last-child)::after {
            content: '';
            position: absolute;
            right: -30px;
            top: 50%;
            width: 30px;
            height: 2px;
            background: var(--accent);
            opacity: 0.4;
        }
        
        .champion {
            text-align: center;
            margin-top: 60px;
            font-size: 2.8rem;
            color: var(--accent);
            text-shadow: 0 0 30px var(--accent);
        }
        
        .empty-state { text-align: center; padding: 100px 20px; color: #666; }
    </style>
</head>
<body>
    <header><h1>BRACKET BATTLE</h1></header>
    
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <h2 style="color: var(--accent);">PARTICIPANTS</h2>
            
            <div class="input-area">
                <input type="text" id="name-input" placeholder="Enter name..." maxlength="20">
            </div>
            
            <div style="display:flex; gap:8px;">
                <button onclick="shuffleParticipants()" style="flex:1">SHUFFLE</button>
                <button onclick="clearAll()" class="secondary-btn" style="flex:1; background:#444;">CLEAR</button>
            </div>
            
            <div class="participants-list" id="participants-list"></div>
            
            <button onclick="generateBracket()" style="padding:18px; font-size:1.1rem;">
                GENERATE BRACKET
            </button>
        </div>
        
        <!-- Main Bracket Area -->
        <div class="main-area">
            <div class="controls">
                <button onclick="resetTournament()" id="reset-btn" style="display:none">NEW TOURNAMENT</button>
                <button onclick="undoLast()" id="undo-btn" style="display:none">UNDO LAST</button>
            </div>
            
            <div id="bracket-container">
                <div class="empty-state">
                    <h2>Add names on the left<br>and click GENERATE BRACKET</h2>
                </div>
            </div>
            
            <div id="champion-display" style="display:none"></div>
        </div>
    </div>

    <script>
        let participants = [];
        let tournament = null;

        const input = document.getElementById('name-input');
        input.addEventListener('keypress', e => {
            if (e.key === 'Enter') addParticipant();
        });

        function addParticipant() {
            const name = input.value.trim();
            if (!name) return;
            if (participants.length >= 32) return alert("Max 32 players");
            
            participants.push({ id: Date.now(), name });
            input.value = '';
            renderParticipants();
        }

        function renderParticipants() {
            const list = document.getElementById('participants-list');
            list.innerHTML = participants.length === 0 
                ? '<div style="padding:30px;text-align:center;color:#666">No participants yet...</div>'
                : '';
            
            participants.forEach((p, i) => {
                const div = document.createElement('div');
                div.className = 'participant';
                div.innerHTML = `
                    <span>${p.name}</span>
                    <button class="remove-btn" onclick="removeParticipant(${i})">X</button>
                `;
                list.appendChild(div);
            });
        }

        function removeParticipant(i) {
            participants.splice(i, 1);
            renderParticipants();
        }

        function shuffleParticipants() {
            for (let i = participants.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [participants[i], participants[j]] = [participants[j], participants[i]];
            }
            renderParticipants();
        }

        function clearAll() {
            if (confirm("Clear all?")) {
                participants = [];
                renderParticipants();
                resetDisplay();
            }
        }

        function generateBracket() {
            if (participants.length < 2) return alert("Need at least 2 participants!");
            
            const shuffled = [...participants].sort(() => Math.random() - 0.5);
            tournament = { rounds: [] };
            
            let active = [...shuffled];
            
            while (active.length > 1) {
                const matches = [];
                const nextActive = [];
                
                for (let i = 0; i < active.length; i += 2) {
                    if (i + 1 < active.length) {
                        matches.push({
                            player1: active[i],
                            player2: active[i+1],
                            winner: null
                        });
                    } else {
                        matches.push({
                            player1: active[i],
                            player2: {name: "BYE", bye: true},
                            winner: active[i]
                        });
                        nextActive.push(active[i]);
                    }
                }
                
                tournament.rounds.push({
                    name: getRoundName(tournament.rounds.length, shuffled.length),
                    matches
                });
                
                active = nextActive.length ? nextActive : new Array(Math.ceil(active.length / 2)).fill(null);
            }
            
            renderBracket();
            document.getElementById('reset-btn').style.display = 'inline-block';
            document.getElementById('undo-btn').style.display = 'inline-block';
        }

        function getRoundName(idx, total) {
            const roundsLeft = Math.ceil(Math.log2(total)) - idx;
            if (roundsLeft === 1) return "FINAL";
            if (roundsLeft === 2) return "SEMI-FINALS";
            if (roundsLeft === 3) return "QUARTER-FINALS";
            return `ROUND ${idx+1}`;
        }

        function renderBracket() {
            const container = document.getElementById('bracket-container');
            container.innerHTML = '';
            
            const bracketDiv = document.createElement('div');
            bracketDiv.className = 'bracket';
            
            tournament.rounds.forEach((round, rIdx) => {
                const roundDiv = document.createElement('div');
                roundDiv.className = 'round';
                
                const header = document.createElement('div');
                header.className = 'round-header';
                header.textContent = round.name;
                roundDiv.appendChild(header);
                
                round.matches.forEach((match, mIdx) => {
                    const matchDiv = document.createElement('div');
                    matchDiv.className = 'match';
                    
                    // Player 1
                    const p1 = createPlayerEl(match.player1, match.winner === match.player1, () => pickWinner(rIdx, mIdx, 0));
                    matchDiv.appendChild(p1);
                    
                    const vs = document.createElement('div');
                    vs.className = 'vs';
                    vs.textContent = 'VS';
                    matchDiv.appendChild(vs);
                    
                    // Player 2
                    const p2 = createPlayerEl(match.player2, match.winner === match.player2, () => pickWinner(rIdx, mIdx, 1));
                    matchDiv.appendChild(p2);
                    
                    roundDiv.appendChild(matchDiv);
                });
                
                bracketDiv.appendChild(roundDiv);
            });
            
            container.appendChild(bracketDiv);
            checkForChampion();
        }

        function createPlayerEl(player, isWinner, clickHandler) {
            const el = document.createElement('div');
            el.className = `player ${isWinner ? 'winner' : ''} ${player.bye ? 'bye' : ''}`;
            el.textContent = player.name;
            if (!isWinner && !player.bye) el.onclick = clickHandler;
            return el;
        }

        function pickWinner(roundIdx, matchIdx, side) {
            const match = tournament.rounds[roundIdx].matches[matchIdx];
            if (match.winner) return;
            
            match.winner = side === 0 ? match.player1 : match.player2;
            
            // Advance to next round
            if (roundIdx + 1 < tournament.rounds.length) {
                const nextMatch = tournament.rounds[roundIdx + 1].matches[Math.floor(matchIdx / 2)];
                if (!nextMatch.player1) nextMatch.player1 = match.winner;
                else nextMatch.player2 = match.winner;
            }
            
            renderBracket();
        }

        function checkForChampion() {
            if (!tournament?.rounds.length) return;
            const final = tournament.rounds[tournament.rounds.length - 1].matches[0];
            if (final?.winner) {
                document.getElementById('champion-display').innerHTML = `
                    <div class="champion">🏆 CHAMPION 🏆<br>${final.winner.name}</div>`;
                document.getElementById('champion-display').style.display = 'block';
            }
        }

        function undoLast() {
            if (!tournament) return;
            for (let r = tournament.rounds.length - 1; r >= 0; r--) {
                for (let m = tournament.rounds[r].matches.length - 1; m >= 0; m--) {
                    if (tournament.rounds[r].matches[m].winner) {
                        tournament.rounds[r].matches[m].winner = null;
                        renderBracket();
                        return;
                    }
                }
            }
        }

        function resetDisplay() {
            document.getElementById('bracket-container').innerHTML = `
                <div class="empty-state">
                    <h2>Add names on the left<br>and click GENERATE BRACKET</h2>
                </div>`;
            document.getElementById('champion-display').style.display = 'none';
            document.getElementById('reset-btn').style.display = 'none';
            document.getElementById('undo-btn').style.display = 'none';
            tournament = null;
        }

        function resetTournament() {
            if (confirm("Start completely new tournament?")) {
                participants = [];
                renderParticipants();
                resetDisplay();
            }
        }

        // Init
        renderParticipants();
    </script>
</body>
</html>
