<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament Bracket</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        :root {
            --bg: #0a0a1f;
            --accent: #00ff9d;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Press Start 2P', system-ui;
            background: var(--bg);
            color: #ddd;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        header {
            background: #1a1a2e;
            padding: 20px;
            text-align: center;
            border-bottom: 4px solid var(--accent);
        }
        
        h1 { font-size: 2.3rem; text-shadow: 0 0 15px var(--accent); }
        
        .container { display: flex; flex: 1; overflow: hidden; }
        
        .sidebar {
            width: 300px;
            background: #1a1a2e;
            padding: 20px;
            border-right: 4px solid var(--accent);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .input-area { display: flex; gap: 8px; }
        input {
            flex: 1;
            padding: 14px;
            background: #16213e;
            border: 2px solid var(--accent);
            color: white;
        }
        
        button {
            font-family: inherit;
            padding: 14px 18px;
            background: var(--accent);
            color: #0a0a1f;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background: #00cc7a; }
        
        .participants-list {
            flex: 1;
            background: #16213e;
            border: 2px solid var(--accent);
            padding: 10px;
            overflow-y: auto;
        }
        
        .participant {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            background: #1e2a4d;
            margin-bottom: 6px;
        }
        
        .remove-btn { background: #ff3366; color: white; padding: 2px 8px; font-size: 0.8rem; }
        
        .main-area {
            flex: 1;
            padding: 30px 20px;
            overflow: auto;
        }
        
        .bracket {
            display: inline-flex;
            gap: 50px;
            position: relative;
        }
        
        .round {
            display: flex;
            flex-direction: column;
            gap: 45px;
            position: relative;
        }
        
        .round-label {
            color: var(--accent);
            text-align: center;
            margin-bottom: 20px;
            font-size: 1rem;
        }
        
        .match {
            position: relative;
            width: 240px;
        }
        
        .player {
            background: #1e2a4d;
            border: 2px solid var(--accent);
            padding: 12px 15px;
            margin: 8px 0;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        
        .player:hover { background: #2a3a66; }
        .player.winner { 
            background: var(--accent); 
            color: #0a0a1f; 
            font-weight: bold; 
            border-color: #fff;
        }
        .player.bye { color: #7777aa; font-style: italic; }
        
        /* Classic Bracket Lines */
        .match::before,
        .match::after {
            content: '';
            position: absolute;
            background: var(--accent);
            opacity: 0.6;
        }
        
        /* Horizontal lines */
        .match::after {
            height: 2px;
            right: -50px;
            top: 50%;
            width: 50px;
        }
        
        /* Vertical connectors */
        .round:not(:last-child) .match:not(:last-child)::before {
            width: 2px;
            height: calc(50% + 45px);
            right: -50px;
            top: 50%;
        }
        
        .champion {
            margin-top: 60px;
            text-align: center;
            font-size: 2.8rem;
            color: var(--accent);
            text-shadow: 0 0 30px var(--accent);
        }
        
        .empty-state {
            text-align: center;
            padding: 120px 40px;
            color: #555;
        }
    </style>
</head>
<body>
    <header><h1>BRACKET BATTLE</h1></header>
    
    <div class="container">
        <div class="sidebar">
            <h2 style="color: var(--accent);">PARTICIPANTS</h2>
            
            <div class="input-area">
                <input type="text" id="name-input" placeholder="Enter name..." maxlength="20">
            </div>
            
            <div style="display:flex; gap:8px;">
                <button onclick="shuffleParticipants()" style="flex:1">SHUFFLE</button>
                <button onclick="clearAll()" style="flex:1; background:#444;">CLEAR</button>
            </div>
            
            <div class="participants-list" id="participants-list"></div>
            
            <button onclick="generateBracket()" style="padding:18px; font-size:1.1rem;">
                GENERATE BRACKET
            </button>
        </div>
        
        <div class="main-area">
            <div style="margin-bottom: 15px;">
                <button onclick="resetTournament()" id="reset-btn" style="display:none">NEW TOURNAMENT</button>
                <button onclick="undoLast()" id="undo-btn" style="display:none">UNDO LAST</button>
            </div>
            
            <div id="bracket-container">
                <div class="empty-state">
                    <h2>Add names on the left<br>→ Click GENERATE BRACKET</h2>
                </div>
            </div>
            
            <div id="champion-display" style="display:none"></div>
        </div>
    </div>

    <script>
        let participants = [];
        let tournament = null;

        const input = document.getElementById('name-input');
        input.addEventListener('keypress', e => { if (e.key === 'Enter') addParticipant(); });

        function addParticipant() {
            const name = input.value.trim();
            if (!name) return;
            if (participants.length >= 32) return alert("Maximum 32 players");
            
            participants.push({ id: Date.now(), name });
            input.value = '';
            renderParticipants();
        }

        function renderParticipants() {
            const list = document.getElementById('participants-list');
            list.innerHTML = participants.length === 0 
                ? '<div style="padding:40px;text-align:center;color:#666">No participants yet...</div>'
                : '';
            
            participants.forEach((p, i) => {
                const div = document.createElement('div');
                div.className = 'participant';
                div.innerHTML = `<span>${p.name}</span><button class="remove-btn" onclick="removeParticipant(${i})">X</button>`;
                list.appendChild(div);
            });
        }

        function removeParticipant(i) {
            participants.splice(i, 1);
            renderParticipants();
        }

        function shuffleParticipants() {
            for (let i = participants.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [participants[i], participants[j]] = [participants[j], participants[i]];
            }
            renderParticipants();
        }

        function clearAll() {
            if (confirm("Clear all participants?")) {
                participants = [];
                renderParticipants();
                resetDisplay();
            }
        }

        function generateBracket() {
            if (participants.length < 2) return alert("Need at least 2 participants!");
            
            const shuffled = [...participants].sort(() => Math.random() - 0.5);
            tournament = { rounds: [] };
            
            let active = [...shuffled];
            
            while (active.length > 1) {
                const matches = [];
                for (let i = 0; i < active.length; i += 2) {
                    if (i + 1 < active.length) {
                        matches.push({ player1: active[i], player2: active[i+1], winner: null });
                    } else {
                        matches.push({ player1: active[i], player2: {name: "BYE", bye: true}, winner: active[i] });
                    }
                }
                tournament.rounds.push({
                    name: getRoundName(tournament.rounds.length, shuffled.length),
                    matches
                });
                active = active.length % 2 === 0 ? new Array(active.length / 2).fill(null) : [];
            }
            
            renderBracket();
            document.getElementById('reset-btn').style.display = 'inline-block';
            document.getElementById('undo-btn').style.display = 'inline-block';
        }

        function getRoundName(idx, total) {
            const rLeft = Math.ceil(Math.log2(total)) - idx;
            if (rLeft === 1) return "FINALS";
            if (rLeft === 2) return "SEMIS";
            if (rLeft === 3) return "QUARTERS";
            return `ROUND ${idx + 1}`;
        }

        function renderBracket() {
            const container = document.getElementById('bracket-container');
            container.innerHTML = '';
            
            const bracketDiv = document.createElement('div');
            bracketDiv.className = 'bracket';
            
            tournament.rounds.forEach((round, rIdx) => {
                const roundDiv = document.createElement('div');
                roundDiv.className = 'round';
                
                const label = document.createElement('div');
                label.className = 'round-label';
                label.textContent = round.name;
                roundDiv.appendChild(label);
                
                round.matches.forEach((match, mIdx) => {
                    const matchDiv = document.createElement('div');
                    matchDiv.className = 'match';
                    
                    const p1 = createPlayer(match.player1, match.winner === match.player1, () => pickWinner(rIdx, mIdx, 0));
                    const vs = document.createElement('div');
                    vs.style.textAlign = 'center';
                    vs.style.color = '#555';
                    vs.style.margin = '4px 0';
                    vs.textContent = 'VS';
                    const p2 = createPlayer(match.player2, match.winner === match.player2, () => pickWinner(rIdx, mIdx, 1));
                    
                    matchDiv.appendChild(p1);
                    matchDiv.appendChild(vs);
                    matchDiv.appendChild(p2);
                    roundDiv.appendChild(matchDiv);
                });
                
                bracketDiv.appendChild(roundDiv);
            });
            
            container.appendChild(bracketDiv);
            checkChampion();
        }

        function createPlayer(player, isWinner, onClick) {
            const el = document.createElement('div');
            el.className = `player ${isWinner ? 'winner' : ''} ${player.bye ? 'bye' : ''}`;
            el.textContent = player.name;
            if (!isWinner && !player.bye) el.onclick = onClick;
            return el;
        }

        function pickWinner(rIdx, mIdx, side) {
            const match = tournament.rounds[rIdx].matches[mIdx];
            if (match.winner) return;
            
            match.winner = side === 0 ? match.player1 : match.player2;
            
            if (rIdx + 1 < tournament.rounds.length) {
                const nextMatch = tournament.rounds[rIdx + 1].matches[Math.floor(mIdx / 2)];
                if (!nextMatch.player1) nextMatch.player1 = match.winner;
                else nextMatch.player2 = match.winner;
            }
            
            renderBracket();
        }

        function checkChampion() {
            if (!tournament) return;
            const finalMatch = tournament.rounds[tournament.rounds.length - 1]?.matches[0];
            if (finalMatch?.winner) {
                document.getElementById('champion-display').innerHTML = `
                    <div class="champion">🏆 CHAMPION 🏆<br>${finalMatch.winner.name}</div>`;
                document.getElementById('champion-display').style.display = 'block';
            }
        }

        function undoLast() {
            if (!tournament) return;
            for (let r = tournament.rounds.length - 1; r >= 0; r--) {
                for (let m = tournament.rounds[r].matches.length - 1; m >= 0; m--) {
                    if (tournament.rounds[r].matches[m].winner) {
                        tournament.rounds[r].matches[m].winner = null;
                        renderBracket();
                        return;
                    }
                }
            }
        }

        function resetDisplay() {
            document.getElementById('bracket-container').innerHTML = `
                <div class="empty-state">
                    <h2>Add names on the left<br>→ Click GENERATE BRACKET</h2>
                </div>`;
            document.getElementById('champion-display').style.display = 'none';
            document.getElementById('reset-btn').style.display = 'none';
            document.getElementById('undo-btn').style.display = 'none';
            tournament = null;
        }

        function resetTournament() {
            if (confirm("Start a new tournament?")) {
                participants = [];
                renderParticipants();
                resetDisplay();
            }
        }

        // Initialize
        renderParticipants();
    </script>
</body>
</html>
