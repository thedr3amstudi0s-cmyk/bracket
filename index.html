<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRACKET BATTLE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body {
            font-family: 'Press Start 2P', system-ui;
            background: #0f0f1a;
            color: #ddd;
            margin: 0;
            padding: 15px;
            overflow: hidden;
        }
        
        header {
            text-align: center;
            margin-bottom: 15px;
        }
        
        h1 {
            color: #00ff9d;
            font-size: 2.2rem;
        }
        
        .controls {
            text-align: center;
            margin-bottom: 15px;
        }
        
        button {
            padding: 10px 18px;
            margin: 0 8px;
            font-family: inherit;
            background: #00ff9d;
            color: #111;
            border: none;
            cursor: pointer;
        }
        
        .bracket {
            display: flex;
            justify-content: center;
            gap: 50px;
            transform: scale(0.85);
            transform-origin: top center;
        }
        
        .half {
            display: flex;
            flex-direction: column;
            gap: 45px;
        }
        
        .match {
            position: relative;
            width: 220px;
        }
        
        .slot {
            background: #1e2a4d;
            border: 3px solid #00ff9d;
            padding: 12px 14px;
            margin: 8px 0;
            min-height: 52px;
            display: flex;
            align-items: center;
            cursor: text;
            transition: all 0.2s;
        }
        
        .slot:focus {
            outline: none;
            border-color: white;
            background: #253366;
        }
        
        .slot.winner {
            background: #00ff9d;
            color: #111;
            border-color: white;
        }
        
        .vs {
            text-align: center;
            color: #00ff9d;
            margin: 4px 0;
            font-size: 0.8rem;
        }
        
        .match::after {
            content: '';
            position: absolute;
            top: 50%;
            right: -40px;
            width: 40px;
            height: 3px;
            background: #00ff9d;
        }
        
        .round:not(:last-child) .match:not(:last-child)::before {
            content: '';
            position: absolute;
            top: 50%;
            right: -40px;
            width: 3px;
            height: calc(50% + 55px);
            background: #00ff9d;
        }
        
        .final {
            text-align: center;
            margin-top: 80px;
        }
    </style>
</head>
<body>
    <header><h1>BRACKET BATTLE</h1></header>
    
    <div class="controls">
        <button onclick="addEmptySlot()">+ ADD PLAYER</button>
        <button onclick="shuffleSlots()">SHUFFLE</button>
        <button onclick="clearAll()">CLEAR</button>
        <button onclick="resetTournament()">NEW TOURNAMENT</button>
    </div>
    
    <div class="bracket" id="bracket"></div>

    <script>
        let slots = [];

        function addEmptySlot() {
            if (slots.length >= 16) return alert("Max 16 players");
            slots.push({name: "", id: Date.now()});
            renderBracket();
        }

        function shuffleSlots() {
            for (let i = slots.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [slots[i], slots[j]] = [slots[j], slots[i]];
            }
            renderBracket();
        }

        function clearAll() {
            if (confirm("Clear all?")) {
                slots = [];
                renderBracket();
            }
        }

        function resetTournament() {
            if (confirm("New tournament?")) {
                slots = [];
                renderBracket();
            }
        }

        function renderBracket() {
            const container = document.getElementById('bracket');
            container.innerHTML = `
                <div class="half" id="left"></div>
                <div class="final" id="final"></div>
                <div class="half" id="right"></div>
            `;
            
            const left = document.getElementById('left');
            const right = document.getElementById('right');
            const final = document.getElementById('final');
            
            // Fill slots with empty ones if needed
            let displaySlots = [...slots];
            const target = Math.pow(2, Math.ceil(Math.log2(Math.max(2, displaySlots.length))));
            while (displaySlots.length < target) {
                displaySlots.push({name: "", id: Date.now()});
            }
            
            // Build rounds
            let current = displaySlots;
            let roundIndex = 0;
            
            while (current.length > 1) {
                const isLeft = roundIndex < Math.ceil(Math.log2(target) / 2);
                const targetDiv = isLeft ? left : right;
                
                const roundDiv = document.createElement('div');
                roundDiv.style.display = 'flex';
                roundDiv.style.flexDirection = 'column';
                roundDiv.style.gap = '45px';
                
                for (let i = 0; i < current.length; i += 2) {
                    const mDiv = document.createElement('div');
                    mDiv.className = 'match';
                    
                    const p1 = createEditableSlot(current[i], roundIndex, i);
                    const vs = document.createElement('div');
                    vs.className = 'vs';
                    vs.textContent = 'VS';
                    const p2 = createEditableSlot(current[i+1], roundIndex, i+1);
                    
                    mDiv.append(p1, vs, p2);
                    roundDiv.appendChild(mDiv);
                }
                
                targetDiv.appendChild(roundDiv);
                current = new Array(current.length / 2).fill({name: "", id: Date.now()});
                roundIndex++;
            }
        }

        function createEditableSlot(player, roundIndex, slotIndex) {
            const el = document.createElement('div');
            el.className = 'slot';
            el.contentEditable = true;
            el.textContent = player.name || "";
            el.onblur = () => {
                player.name = el.textContent.trim();
            };
            return el;
        }

        // Init
        renderBracket();
    </script>
</body>
</html>
