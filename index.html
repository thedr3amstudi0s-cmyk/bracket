<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament Bracket</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body {
            font-family: 'Press Start 2P', system-ui;
            background: #f8f8f8;
            color: #111;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        h1 {
            color: #1a1a2e;
            font-size: 2.4rem;
        }
        
        .main {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
        }
        
        .side {
            display: flex;
            flex-direction: column;
            gap: 80px;
            position: relative;
        }
        
        .bracket-half {
            display: flex;
            gap: 80px;
        }
        
        .round {
            display: flex;
            flex-direction: column;
            gap: 70px;
        }
        
        .match {
            position: relative;
            width: 260px;
        }
        
        .player {
            background: white;
            border: 3px solid #222;
            padding: 14px 18px;
            margin: 12px 0;
            min-height: 58px;
            display: flex;
            align-items: center;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 2px 2px 0 #222;
        }
        
        .player:hover {
            background: #f0f0f0;
        }
        
        .player.winner {
            background: #00ff9d;
            border-color: #00aa66;
            color: #111;
            font-weight: bold;
        }
        
        .player.bye {
            color: #666;
            font-style: italic;
        }
        
        .vs {
            text-align: center;
            color: #444;
            margin: 4px 0;
            font-size: 0.85rem;
        }
        
        /* Lines */
        .match::after {
            content: '';
            position: absolute;
            top: 50%;
            right: -40px;
            width: 40px;
            height: 3px;
            background: #222;
        }
        
        .round:not(:last-child) .match:not(:last-child)::before {
            content: '';
            position: absolute;
            top: 50%;
            right: -40px;
            width: 3px;
            height: calc(50% + 75px);
            background: #222;
        }
        
        .final {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-top: 60px;
        }
        
        .final-match {
            width: 300px;
        }
        
        .champion {
            margin-top: 40px;
            font-size: 2.8rem;
            text-align: center;
            color: #1a1a2e;
        }
        
        .sidebar {
            position: fixed;
            left: 20px;
            top: 100px;
            width: 260px;
            background: white;
            border: 3px solid #222;
            padding: 20px;
            box-shadow: 4px 4px 0 #222;
        }
    </style>
</head>
<body>
    <header>
        <h1>TOURNAMENT BRACKET</h1>
    </header>

    <div class="sidebar">
        <h3>PARTICIPANTS</h3>
        <div style="display:flex; gap:8px; margin:10px 0;">
            <input type="text" id="name-input" placeholder="Name" style="flex:1; padding:10px;">
            <button onclick="addParticipant()">ADD</button>
        </div>
        <button onclick="shuffleParticipants()" style="width:100%; margin:5px 0;">SHUFFLE</button>
        <button onclick="clearAll()" style="width:100%; margin:5px 0; background:#ddd;">CLEAR</button>
        <button onclick="generateBracket()" style="width:100%; padding:15px; margin-top:10px; background:#222; color:white;">GENERATE BRACKET</button>
        
        <div id="participants-list" style="margin-top:15px; max-height:400px; overflow-y:auto;"></div>
    </div>

    <div class="main" id="bracket-container">
        <!-- Populated by JS -->
    </div>

    <script>
        let participants = [];
        let tournament = null;

        function addParticipant() {
            const input = document.getElementById('name-input');
            const name = input.value.trim();
            if (!name) return;
            if (participants.length >= 16) return alert("Max 16 for nice layout");
            participants.push({id: Date.now(), name});
            input.value = '';
            renderList();
        }

        function renderList() {
            const list = document.getElementById('participants-list');
            list.innerHTML = '';
            participants.forEach((p, i) => {
                const d = document.createElement('div');
                d.style.padding = '8px';
                d.style.borderBottom = '1px solid #ddd';
                d.innerHTML = `${p.name} <button onclick="removeParticipant(${i})" style="float:right; background:#ff4444; color:white; border:none;">X</button>`;
                list.appendChild(d);
            });
        }

        function removeParticipant(i) {
            participants.splice(i, 1);
            renderList();
        }

        function shuffleParticipants() {
            for (let i = participants.length-1; i > 0; i--) {
                const j = Math.floor(Math.random()*(i+1));
                [participants[i], participants[j]] = [participants[j], participants[i]];
            }
            renderList();
        }

        function clearAll() {
            if (confirm("Clear all?")) {
                participants = [];
                renderList();
                document.getElementById('bracket-container').innerHTML = '<h2 style="text-align:center; margin-top:100px; color:#666">Add players and generate bracket</h2>';
            }
        }

        function generateBracket() {
            if (participants.length < 2) return alert("Need at least 2 players");
            
            let players = [...participants].sort(() => Math.random() - 0.5);
            
            // Pad to power of 2 with byes
            const nextPower = Math.pow(2, Math.ceil(Math.log2(players.length)));
            while (players.length < nextPower) {
                players.push({name: "BYE", bye: true});
            }
            
            tournament = {rounds: []};
            let current = players;
            
            while (current.length > 1) {
                const matches = [];
                for (let i = 0; i < current.length; i += 2) {
                    matches.push({
                        p1: current[i],
                        p2: current[i+1],
                        winner: null
                    });
                }
                tournament.rounds.push({matches});
                current = new Array(current.length / 2).fill(null);
            }
            
            renderFullBracket();
        }

        function renderFullBracket() {
            const container = document.getElementById('bracket-container');
            container.innerHTML = `
                <div style="display:flex; gap:80px; align-items:center; justify-content:center;">
                    <!-- Left Side -->
                    <div class="side" id="left-side"></div>
                    
                    <!-- Final -->
                    <div style="text-align:center">
                        <div class="final" id="final-area"></div>
                    </div>
                    
                    <!-- Right Side -->
                    <div class="side" id="right-side"></div>
                </div>
            `;
            
            // For simplicity we'll show one big bracket
            // (You can split later if needed)
            const bracketHTML = document.createElement('div');
            bracketHTML.style.display = 'flex';
            bracketHTML.style.gap = '60px';
            
            tournament.rounds.forEach((round, idx) => {
                const roundDiv = document.createElement('div');
                roundDiv.style.display = 'flex';
                roundDiv.style.flexDirection = 'column';
                roundDiv.style.gap = '70px';
                
                const label = document.createElement('div');
                label.textContent = idx === tournament.rounds.length-1 ? "FINAL" : `ROUND ${idx+1}`;
                label.style.textAlign = 'center';
                label.style.marginBottom = '20px';
                roundDiv.appendChild(label);
                
                round.matches.forEach((match, mIdx) => {
                    const mDiv = document.createElement('div');
                    mDiv.className = 'match';
                    
                    const p1El = createPlayer(match.p1, match.winner === match.p1, () => selectWinner(idx, mIdx, 0));
                    const vs = document.createElement('div');
                    vs.className = 'vs';
                    vs.textContent = 'VS';
                    const p2El = createPlayer(match.p2, match.winner === match.p2, () => selectWinner(idx, mIdx, 1));
                    
                    mDiv.append(p1El, vs, p2El);
                    roundDiv.appendChild(mDiv);
                });
                bracketHTML.appendChild(roundDiv);
            });
            
            container.innerHTML = '';
            container.appendChild(bracketHTML);
        }

        function createPlayer(p, isWinner, clickFn) {
            const el = document.createElement('div');
            el.className = 'player';
            if (isWinner) el.classList.add('winner');
            if (p.bye) el.classList.add('bye');
            el.textContent = p.name;
            if (!isWinner && !p.bye) el.onclick = clickFn;
            return el;
        }

        function selectWinner(roundIdx, matchIdx, side) {
            const match = tournament.rounds[roundIdx].matches[matchIdx];
            if (match.winner) return;
            
            match.winner = side === 0 ? match.p1 : match.p2;
            
            if (roundIdx + 1 < tournament.rounds.length) {
                const nextMatch = tournament.rounds[roundIdx+1].matches[Math.floor(matchIdx/2)];
                if (nextMatch) {
                    if (matchIdx % 2 === 0) nextMatch.p1 = match.winner;
                    else nextMatch.p2 = match.winner;
                }
            }
            renderFullBracket();
        }

        function renderList() {
            // already defined above
        }
    </script>
</body>
</html>
