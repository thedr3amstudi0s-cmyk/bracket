<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRACKET BATTLE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body {
            font-family: 'Press Start 2P', system-ui;
            background: #f8f8f8;
            margin: 0;
            padding: 20px;
            font-size: 14px;
        }
        
        header {
            text-align: center;
            margin-bottom: 25px;
        }
        
        h1 {
            color: #1a1a2e;
            font-size: 2.4rem;
        }
        
        .app {
            display: grid;
            grid-template-columns: 260px 1fr;
            gap: 30px;
            max-width: 1600px;
            margin: 0 auto;
        }
        
        .sidebar {
            background: white;
            border: 5px solid #111;
            padding: 20px;
            box-shadow: 6px 6px 0 #111;
            height: fit-content;
        }
        
        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 12px;
            border: 3px solid #00aa66;
            font-family: inherit;
        }
        
        button {
            width: 100%;
            padding: 14px;
            margin: 6px 0;
            font-family: inherit;
            cursor: pointer;
        }
        
        .list {
            max-height: 520px;
            overflow-y: auto;
            margin-top: 15px;
        }
        
        .participant {
            padding: 10px;
            background: #f0f0f0;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
        }
        
        .bracket-area {
            background: white;
            border: 5px solid #111;
            padding: 30px;
            overflow-x: auto;
            box-shadow: 6px 6px 0 #111;
        }
        
        .bracket {
            display: flex;
            gap: 60px;
            justify-content: center;
            position: relative;
        }
        
        .half {
            display: flex;
            flex-direction: column;
            gap: 55px;
        }
        
        .match {
            position: relative;
            width: 230px;
        }
        
        .player {
            background: white;
            border: 4px solid #222;
            padding: 14px 16px;
            margin: 10px 0;
            min-height: 54px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .player:hover { background: #f8f8f8; }
        .player.winner {
            background: #00ff9d;
            border-color: #00aa66;
        }
        .player.bye { color: #666; font-style: italic; }
        
        .vs {
            text-align: center;
            color: #555;
            margin: 4px 0;
        }
        
        .champion {
            text-align: center;
            font-size: 2.6rem;
            margin: 60px 0;
            color: #1a1a2e;
        }
    </style>
</head>
<body>
    <header><h1>BRACKET BATTLE</h1></header>
    
    <div class="app">
        <!-- Sidebar -->
        <div class="sidebar">
            <h2>PARTICIPANTS</h2>
            <input type="text" id="name-input" placeholder="Enter name..." onkeypress="if(event.key === 'Enter') addParticipant()">
            <button onclick="addParticipant()">ADD PLAYER</button>
            <button onclick="shuffleParticipants()">SHUFFLE</button>
            <button onclick="clearAll()" style="background:#ddd;">CLEAR ALL</button>
            
            <div class="list" id="participants-list"></div>
            
            <button onclick="generateBracket()" style="margin-top:20px; padding:18px; background:#111; color:white; font-size:1.1rem;">
                GENERATE BRACKET
            </button>
        </div>
        
        <!-- Bracket -->
        <div class="bracket-area" id="bracket-container">
            <div style="text-align:center; padding:140px 40px; color:#666;">
                <h2>Add players on the left</h2>
                <p>Then click GENERATE BRACKET</p>
            </div>
        </div>
    </div>

    <script>
        let participants = [];
        let tournament = null;

        function addParticipant() {
            const input = document.getElementById('name-input');
            const name = input.value.trim();
            if (!name) return;
            if (participants.length >= 16) return alert("Max 16 players for clean bracket");
            participants.push({id: Date.now(), name});
            input.value = '';
            renderList();
        }

        function renderList() {
            const list = document.getElementById('participants-list');
            list.innerHTML = '';
            participants.forEach((p, i) => {
                const div = document.createElement('div');
                div.className = 'participant';
                div.innerHTML = `${p.name} <button onclick="removeParticipant(${i})" style="background:#ff3366;color:white;border:none;">X</button>`;
                list.appendChild(div);
            });
        }

        function removeParticipant(i) {
            participants.splice(i, 1);
            renderList();
        }

        function shuffleParticipants() {
            for (let i = participants.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [participants[i], participants[j]] = [participants[j], participants[i]];
            }
            renderList();
        }

        function clearAll() {
            if (confirm("Clear all players?")) {
                participants = [];
                renderList();
                resetBracket();
            }
        }

        function generateBracket() {
            if (participants.length < 2) return alert("Need at least 2 players");
            
            let players = [...participants].sort(() => Math.random() - 0.5);
            const targetSize = Math.pow(2, Math.ceil(Math.log2(players.length)));
            while (players.length < targetSize) {
                players.push({name: "BYE", bye: true});
            }
            
            tournament = {rounds: []};
            let current = players;
            
            while (current.length > 1) {
                const matches = [];
                for (let i = 0; i < current.length; i += 2) {
                    matches.push({
                        p1: current[i],
                        p2: current[i+1],
                        winner: null
                    });
                }
                tournament.rounds.push({matches});
                current = new Array(current.length / 2).fill(null);
            }
            
            renderBracket();
        }

        function renderBracket() {
            const container = document.getElementById('bracket-container');
            container.innerHTML = `
                <div class="bracket">
                    <div class="half" id="left-half"></div>
                    <div style="text-align:center; margin-top:140px;">
                        <div style="font-size:1.3rem; margin-bottom:20px;">FINAL</div>
                        <div id="final-match" style="width:280px;"></div>
                    </div>
                    <div class="half" id="right-half"></div>
                </div>
            `;
            
            const left = document.getElementById('left-half');
            const right = document.getElementById('right-half');
            const finalMatchEl = document.getElementById('final-match');
            
            const mid = Math.ceil(tournament.rounds.length / 2);
            
            tournament.rounds.slice(0, mid).forEach((round, idx) => {
                left.appendChild(createRound(round, idx));
            });
            
            tournament.rounds.slice(mid).forEach((round, idx) => {
                right.appendChild(createRound(round, idx + mid));
            });
            
            // Final
            const finalRound = tournament.rounds[tournament.rounds.length - 1];
            if (finalRound && finalRound.matches[0]) {
                const match = finalRound.matches[0];
                const finalDiv = document.createElement('div');
                finalDiv.className = 'match';
                
                const p1 = createPlayer(match.p1, match.winner === match.p1, () => pickWinner(tournament.rounds.length - 1, 0, 0));
                const vs = document.createElement('div');
                vs.className = 'vs';
                vs.textContent = 'VS';
                const p2 = createPlayer(match.p2, match.winner === match.p2, () => pickWinner(tournament.rounds.length - 1, 0, 1));
                
                finalDiv.append(p1, vs, p2);
                finalMatchEl.appendChild(finalDiv);
            }
        }

        function createRound(round, roundIndex) {
            const roundDiv = document.createElement('div');
            roundDiv.style.display = 'flex';
            roundDiv.style.flexDirection = 'column';
            roundDiv.style.gap = '50px';
            
            round.matches.forEach((match, mIdx) => {
                const matchDiv = document.createElement('div');
                matchDiv.className = 'match';
                
                const p1 = createPlayer(match.p1, match.winner === match.p1, () => pickWinner(roundIndex, mIdx, 0));
                const vs = document.createElement('div');
                vs.className = 'vs';
                vs.textContent = 'VS';
                const p2 = createPlayer(match.p2, match.winner === match.p2, () => pickWinner(roundIndex, mIdx, 1));
                
                matchDiv.append(p1, vs, p2);
                roundDiv.appendChild(matchDiv);
            });
            return roundDiv;
        }

        function createPlayer(player, isWinner, onClick) {
            const el = document.createElement('div');
            el.className = `player ${isWinner ? 'winner' : ''} ${player && player.bye ? 'bye' : ''}`;
            el.textContent = player ? player.name : "TBD";
            if (!isWinner && player && !player.bye) el.onclick = onClick;
            return el;
        }

        function pickWinner(roundIndex, matchIndex, side) {
            const match = tournament.rounds[roundIndex].matches[matchIndex];
            if (match.winner) return;
            
            match.winner = side === 0 ? match.p1 : match.p2;
            
            if (roundIndex + 1 < tournament.rounds.length) {
                const nextMatch = tournament.rounds[roundIndex + 1].matches[Math.floor(matchIndex / 2)];
                if (nextMatch) {
                    if (matchIndex % 2 === 0) nextMatch.p1 = match.winner;
                    else nextMatch.p2 = match.winner;
                }
            }
            renderBracket();
        }

        function resetBracket() {
            document.getElementById('bracket-container').innerHTML = `
                <div style="text-align:center; padding:140px 40px; color:#666;">
                    <h2>Add players on the left</h2>
                    <p>Then click GENERATE BRACKET</p>
                </div>`;
        }

        renderList();
    </script>
</body>
</html>
